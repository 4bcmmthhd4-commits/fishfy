        (function () {
            function isReloadNavigation() {
                try {
                    var n = performance.getEntriesByType && performance.getEntriesByType("navigation")[0];
                    if (n && n.type === "reload") return true;
                } catch (e) {}
                try {
                    return performance.navigation && performance.navigation.type === 1;
                } catch (e2) {}
                return false;
            }
            function resetAfterReload() {
                if (!isReloadNavigation()) return;
                try {
                    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
                } catch (e) {}
                var base = location.pathname + location.search;
                if (location.hash) {
                    try {
                        history.replaceState(null, "", base);
                    } catch (e2) {}
                }
                window.scrollTo(0, 0);
            }
            resetAfterReload();
            window.addEventListener(
                "pageshow",
                function (ev) {
                    if (ev.persisted) return;
                    resetAfterReload();
                },
                { passive: true }
            );
            window.addEventListener("load", resetAfterReload, { passive: true });
        })();

e Ihren gewöhnlichen Aufenthalt haben.", s9:"9. Spot belegt (Pro-Funktion)", s9c:"Die Pro-Funktion „Spot belegt“ ist eine unterstützende Community-Funktion und begründet keinen Anspruch auf Exklusivität, Reservierung oder tatsächliche Verfügbarkeit eines Angelplatzes.\n\nAngezeigte Belegt-Informationen beruhen auf technischen Näherungen (z.B. Standortgenauigkeit, Berechtigungen, Netzverfügbarkeit, Betriebssystemverhalten). Es kann zu Verzögerungen, Abweichungen oder vorübergehend unzutreffenden Anzeigen kommen.\n\nWir übernehmen keine Gewähr dafür, dass ein Spot aufgrund der Anzeige tatsächlich frei oder belegt ist. Die Entscheidung zur Nutzung eines Spots liegt stets in Ihrer eigenen Verantwortung.", contact:"Kontakt", contactText:"Bei Fragen zu diesen Nutzungsbedingungen kontaktieren Sie uns unter:\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. Alle Rechte vorbehalten." },

rden \"zoals ze zijn\" aangeboden.\n• Er wordt geen garantie gegeven voor de juistheid, volledigheid of actualiteit van de informatie.\n• De app aanvaardt geen aansprakelijkheid voor schade voortvloeiend uit gebruik.\n• Vissen is op eigen risico.\n• Het gebruik van de app is op eigen verantwoordelijkheid, in het bijzonder met betrekking tot weer, wateromstandigheden, toegang tot oevergebieden en persoonlijke veiligheid.\n• Peil-, wind- en prognosegegevens zijn beslissingshulpen en moeten ter plaatse op eigen verantwoordelijkheid worden gecontroleerd.\n\nDe Pro-functie \"Spot bezet\" is een ondersteunende communityfunctie en geeft geen recht op exclusiviteit, reservering of daadwerkelijke beschikbaarheid van een visstek.\n\nGetoonde bezet-informatie is gebaseerd op technische benaderingen (bijv. locatienauwkeurigheid, toestemmingen, netwerkbeschikbaarheid, gedrag van het besturingssysteem). Vertragingen, afwijkingen of tijdelijk onjuiste weergaven kunnen voorkomen.\n\nWij garanderen niet dat een spot op basis van deze weergave daadwerkelijk vrij of bezet is. De beslissing om een spot te gebruiken blijft volledig je eigen verantwoordelijkheid.", s5:"5. Privacy", s5c:"De verzameling en verwerking van persoonsgegevens geschiedt in overeenstemming met ons privacybeleid.", s6:"6. Wijzigingen van de app", s6c:"Wij behouden ons het recht voor de app op elk moment te wijzigen, uit te breiden of stop te zetten. Er bestaat geen aanspraak op specifieke functies of beschikbaarheid.", s7:"7. Auteursrecht", s7c:"Alle inhoud van de app, inclusief teksten, afbeeldingen, logo's en software, is beschermd door auteursrecht.", s8:"8. Slotbepalingen", s8c:"Als afzonderlijke bepalingen van deze gebruiksvoorwaarden ongeldig zijn of worden, blijft de geldigheid van de overige bepalingen onverlet.\n\nDuits recht is van toepassing, tenzij dwingende consumentenbeschermingsbepalingen van het land waar je je gewone verblijfplaats hebt anders bepalen.", s9:"9. Spot bezet (Pro-functie)", s9c:"De Pro-functie \"Spot bezet\" is een ondersteunende communityfunctie en geeft geen recht op exclusiviteit, reservering of daadwerkelijke beschikbaarheid van een visstek.\n\nGetoonde bezet-informatie is gebaseerd op technische benaderingen (bijv. locatienauwkeurigheid, toestemmingen, netwerkbeschikbaarheid, gedrag van het besturingssysteem). Vertragingen, afwijkingen of tijdelijk onjuiste weergaven kunnen voorkomen.\n\nWij garanderen niet dat een spot op basis van deze weergave daadwerkelijk vrij of bezet is. De beslissing om een spot te gebruiken blijft volledig je eigen verantwoordelijkheid.", contact:"Contact", contactText:"Voor vragen over deze voorwaarden kun je contact opnemen via:\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. Alle rechten voorbehouden." },
                fr: { pageTitle:"Conditions d'utilisation", updated:"État : 3 mai 2026", nav_features:"Fonctionnalités", nav_about:"À propos", nav_privacy:"Confidentialité", nav_imprint:"Mentions légales", home:"Accueil", privacy:"Confidentialité", imprint:"Mentions légales", terms:"Conditions", nav_aria_menu:"Ouvrir le menu", nav_aria_close:"Fermer le menu", nav_aria_backdrop:"Fermer le menu", s1:"1. Champ d'application", s1c:"Les présentes conditions d'utilisation régissent l'utilisation de l'application mobile « Fishfy » (ci-après « App »).\n\nEn installant et en utilisant l'App, vous acceptez ces conditions d'utilisation.", s2:"2. Objet de l'app", s2c:"Fishfy est une app de pêche qui analyse les données météo et les conditions pour fournir des tactiques et des prévisions. Cela inclut les prévisions d'activité et des notifications optionnelles (p. ex. bonne activité ou conditions similaires à d'anciennes prises). L'app sert d'aide à la décision et ne garantit pas le succès à la pêche. De plus, les utilisateurs Pro peuvent importer manuellement d'anciennes prises (avec saisie de l'heure/position et enrichissement météo historique optionnel).", s3:"3. Utilisation", s3c:"• L'utilisation de l'app est autorisée à des fins privées et professionnelles.\n• Vous êtes responsable du respect de toutes les lois et réglementations en vigueur lors de la pêche.\n• L'app ne constitue pas un conseil juridique.\n• Vous êtes responsable du respect des lois et règles locales de pêche (p. ex. périodes de fermeture, tailles minimales, limites de prises, interdictions d'appâts, droits d'accès, zones restreintes, permis de pêche, autorisation, cartes journalières et réglementation des eaux).\n• Le contenu, les prévisions, scores et tactiques dans l'app ne remplacent pas les règles officielles ou de club ni les informations juridiquement contraignantes. Les réglementations locales applicables prévalent toujours.\n• Les prises importées historiquement ('Anciennes prises') sont exclues du transfert de prises et ne peuvent pas être transférées vers d'autres comptes.", s4:"4. Avertissement", s4c:"• L'app et ses tactiques sont fournies « en l'état ».\n• Aucune garantie n'est donnée quant à l'exactitude, l'exhaustivité ou l'actualité des informations.\n• L'app n'assume aucune responsabilité pour les dommages résultant de l'utilisation.\n• La pêche est à vos propres risques.\n• L'utilisation de l'app est sous votre propre responsabilité, notamment en ce qui concerne la météo, les conditions de l'eau, l'accès aux berges et la sécurité personnelle.\n• Les informations de niveau d'eau, de vent et de prévision sont des aides à la décision et doivent être vérifiées sur place sous votre propre responsabilité.\n\nLa fonction Pro « Spot occupé » est une fonction communautaire d'assistance et ne confère aucun droit d'exclusivité, de réservation ou de disponibilité réelle d'un spot de pêche.\n\nLes informations d'occupation affichées reposent sur des approximations techniques (p. ex. précision de localisation, autorisations, disponibilité réseau, comportement du système d'exploitation). Des retards, écarts ou affichages temporairement inexacts peuvent survenir.\n\nNous ne garantissons pas qu'un spot soit effectivement libre ou occupé sur la base de cet affichage. La décision d'utiliser un spot relève toujours de votre propre responsabilité.", s5:"5. Données personnelles", s5c:"La collecte et le traitement des données personnelles sont effectués conformément à notre politique de confidentialité.", s6:"6. Modifications de l'app", s6c:"Nous nous réservons le droit de modifier, d'étendre ou d'arrêter l'app à tout moment. Il n'existe aucun droit à des fonctionnalités ou une disponibilité spécifiques.", s7:"7. Droits d'auteur", s7c:"Tout le contenu de l'app, y compris les textes, graphiques, logos et logiciels, est protégé par le droit d'auteur.", s8:"8. Dispositions finales", s8c:"Si des dispositions individuelles des présentes conditions d'utilisation sont ou deviennent invalides, la validité des autres dispositions reste inchangée.\n\nLe droit allemand s'applique, sauf si des dispositions impératives de protection des consommateurs du pays de votre résidence habituelle en disposent autrement.", s9:"9. Spot occupé (fonction Pro)", s9c:"La fonction Pro « Spot occupé » est une fonction communautaire d'assistance et ne confère aucun droit d'exclusivité, de réservation ou de disponibilité réelle d'un spot de pêche.\n\nLes informations d'occupation affichées reposent sur des approximations techniques (p. ex. précision de localisation, autorisations, disponibilité réseau, comportement du système d'exploitation). Des retards, écarts ou affichages temporairement inexacts peuvent survenir.\n\nNous ne garantissons pas qu'un spot soit effectivement libre ou occupé sur la base de cet affichage. La décision d'utiliser un spot relève toujours de votre propre responsabilité.", contact:"Contact", contactText:"Pour toute question relative aux conditions, contactez-nous à :\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. Tous droits réservés." },
                lb: { pageTitle:"Benotzungsbedingungen", updated:"Stand: 3. Mee 2026", nav_features:"Funktiounen", nav_about:"Iwwer eis", nav_privacy:"Dateschutz", nav_imprint:"Impressum", home:"Startsäit", privacy:"Dateschutz", imprint:"Impressum", terms:"Benotzungsbedingungen", nav_aria_menu:"Menu opmaachen", nav_aria_close:"Menu zoumaachen", nav_aria_backdrop:"Menu zoumaachen", s1:"1. Gëlungsberäich", s1c:"Dës Benotzungsbedingungen reegelen d'Benotzung vun der mobiler Applikatioun \"Fishfy\" (am Folgenden \"App\").\n\nMat der Installatioun an Benotzung vun der App akzeptéiert dir dës Benotzungsbedingungen.", s2:"2. Zweck vun der App", s2c:"Fishfy ass eng Angel-App, déi Wiederdaten a Bedingungen analyséiert, fir Taktiken a Virsoen fir d'Angelen ze ginn. Dobäi gehéieren ënner anerem Aktivitéitsvirsoen sou wéi optional Notifikatiounen (z.B. bei gudder Aktivitéit oder ähnleche Bedingungen wéi bei fréiere Fäng). D'App déngt als Entscheedungshëllef a bitt keng Garantie op Fang-Erfolleg. Zousätzlech kënnen Pro-Benotzer al Fäng manuell importéieren (mat eegener Angab vu Zäit/Positioun an optionaler historescher Wieder-Ergänzung).", s3:"3. Benotzung", s3c:"• D'Benotzung vun der App ass fir privat a berufflech Zwecker erlaabt.\n• Dir sidd verantwortlech fir d'Respektéierung vun alle gëlende Gesetzer a Veruerdnungen beim Angelen.\n• D'App stellt keng Rechtsberodung duer.\n• Dir sidd selwer verantwortlech, viru Plaz déi jeweileg gëlend Angelgesetzer a Reegelen anzuhalen (z.B. Schonzeiten, Mindestmoossen, Fanglimiten, Këderverbuet, Betrëttsrechter, Sperrzonen, Fëschereischein, Erlabnisschein, Angelkaarten a Gewässeruerdnungen).\n• Inhalter, Virsoen, Scores a Taktiken an der App ersetzen keng behierdlech oder veräinsrechtlech Virgaben a keng rechtsverbindlech Informatiounen. Massgebend sinn ëmmer déi jeweileg gëlend Reegelungen viru Plaz.\n• Historesch importéiert Fäng ('Al Fäng') si vum Fang-Transfer ausgeschloss a kënnen net op aner Konten iwwerdroe ginn.", s4:"4. Haftungsausschluss", s4c:"• D'App an hir Taktike ginn \"wéi gesinn\" zur Verfügung gestallt.\n• Et gëtt keng Gewähr fir d'Richtegkeet, Vollstännegkeet oder Aktualitéit vun den Informatiounen iwwerholl.\n• D'App iwwerhëlt keng Haftung fir Schied, déi duerch d'Benotzung entstinn.\n• Angelen geschitt op eegener Verantwortung.\n• D'Benotzung vun der App geschitt op eegener Verantwortung, besonnesch am Hibléck op Wieder, Gewässerbedingungen, Betrëtt vun Uferberäicher a perséinlech Sécherheet.\n• Pegel-, Wand- a Prognose-Informatioune sinn Entscheedungshëllefen a mussen op der Plaz op eegener Verantwortung gepréift ginn.\n\nD'Pro-Funktioun \"Spot besat\" ass eng ënnerstëtzend Community-Funktioun a begrënnt keen Usproch op Exklusivitéit, Reservéierung oder tatsächlech Disponibilitéit vun engem Angelspot.\n\nD'gewisen Besat-Informatioune baséieren op technesche Näherungen (z.B. Standuertgenauegkeet, Erlaabnisser, Netzwierkverfügbarkeet, Verhale vum Betribssystem). Verspéidungen, Ofwäichungen oder temporär ongenau Unzeeche kënnen optrieden.\n\nMir iwwerhuelen keng Gewähr, datt e Spot op Basis vun där Unzeeche wierklech fräi oder besat ass. D'Entscheedung, e Spot ze benotzen, bleift ëmmer Är eege Verantwortung.", s5:"5. Dateschutz", s5c:"D'Erhiewung an Veraarbechtung vu perséinleche Donnéeën geschitt geméiss eiser Dateschutzerklärung.", s6:"6. Ännerungen vun der App", s6c:"Mir behalen eis vir, d'App jee Zäit z'änneren, z'erweideren oder anzestellen. Et besteet kee Usproch op bestëmmt Funktiounen oder Disponibilitéit.", s7:"7. Urheberrecht", s7c:"All Inhalter vun der App, inklusiv Texter, Grafiken, Logoen a Software, sinn urheberrechtlech geschützt.", s8:"8. Schlussbestëmmungen", s8c:"Sollt eenzel Bestëmmungen vun dëse Benotzungsbedingungen ongëlteg sinn oder ginn, bleift d'Gëltegkeet vun den anere Bestëmmungen onberéiert.\n\nEt gëllt däitscht Recht, sou wäit deem keng zwingend Verbraucherschutzvirschrëft vum Staat entgéintstinn, an deem Dir Ären gewéinlechen Openthal hutt.", s9:"9. Spot besat (Pro-Funktioun)", s9c:"D'Pro-Funktioun \"Spot besat\" ass eng ënnerstëtzend Community-Funktioun a begrënnt keen Usproch op Exklusivitéit, Reservéierung oder tatsächlech Disponibilitéit vun engem Angelspot.\n\nD'gewisen Besat-Informatioune baséieren op technesche Näherungen (z.B. Standuertgenauegkeet, Erlaabnisser, Netzwierkverfügbarkeet, Verhale vum Betribssystem). Verspéidungen, Ofwäichungen oder temporär ongenau Unzeeche kënnen optrieden.\n\nMir iwwerhuelen keng Gewähr, datt e Spot op Basis vun där Unzeeche wierklech fräi oder besat ass. D'Entscheedung, e Spot ze benotzen, bleift ëmmer Är eege Verantwortung.", contact:"Kontakt", contactText:"Bei Froen zu dëse Benotzungsbedingungen kontaktéiert eis w.e.g. ënner:\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. All Rechter virbehalen." }

            window.__fishfyNavOpen = false;
            function applyNavMenuLabels(lang) {
                const t = content[lang] || content[FALLBACK];
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (toggle && t.nav_aria_menu && t.nav_aria_close) {
                    toggle.setAttribute("aria-label", window.__fishfyNavOpen ? t.nav_aria_close : t.nav_aria_menu);
                }
                if (backdrop && t.nav_aria_backdrop) {
                    backdrop.setAttribute("aria-label", t.nav_aria_backdrop);
                    backdrop.setAttribute("aria-hidden", window.__fishfyNavOpen ? "false" : "true");
                }
            }
            function isNarrowNav() { return window.matchMedia("(max-width: 1024px)").matches; }
            function setNavMenuOpen(open) {
                const nav = document.getElementById("site-nav");
                const toggle = document.getElementById("nav-menu-toggle");
                if (!nav || !toggle) return;
                window.__fishfyNavOpen = !!open;
                nav.classList.toggle("nav-menu-open", window.__fishfyNavOpen);
                document.body.classList.toggle("nav-menu-open-body", window.__fishfyNavOpen);
                toggle.setAttribute("aria-expanded", window.__fishfyNavOpen ? "true" : "false");
                applyNavMenuLabels(normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK));
            }
            function closeNavMenu() { if (window.__fishfyNavOpen) setNavMenuOpen(false); }
            function toggleNavMenu() { if (!isNarrowNav()) return; setNavMenuOpen(!window.__fishfyNavOpen); }

            function normalizeLang(input){ if(!input) return FALLBACK; const v=input.toLowerCase(); if(v.startsWith("lb")||v.startsWith("lu")) return "lb"; const b=v.split("-")[0]; return SUPPORTED.includes(b)?b:FALLBACK; }
            function escapeHtml(text){ return text.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
            function render(lang){
                const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.pageTitle;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("updated").textContent = t.updated;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;
                applyNavMenuLabels(lang);
                sections.innerHTML = [
                    ["s1","s1c"],["s2","s2c"],["s3","s3c"],["s4","s4c"],["s5","s5c"],["s6","s6c"],["s7","s7c"],["s8","s8c"]
                ].map(([k,ck]) => '<h2>' + escapeHtml(t[k]) + '</h2><div class="section-text">' + escapeHtml(t[ck]).replaceAll("\n","<br>") + '</div>').join("")
                + '<h2>' + escapeHtml(t.contact) + '</h2><div class="info-box">' + escapeHtml(t.contactText).replaceAll("\n","<br>") + '</div>';
            }

            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => { const lang = normalizeLang(event.target.value); localStorage.setItem(storageKey, lang); render(lang); });
            (function initMobileNav() {
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (!toggle) return;
                toggle.addEventListener("click", function (e) { e.stopPropagation(); toggleNavMenu(); });
                if (backdrop) backdrop.addEventListener("click", closeNavMenu);
                const panel = document.getElementById("primary-nav");
                if (panel) {
                    panel.querySelectorAll("a").forEach(function (link) {
                        link.addEventListener("click", function () { if (isNarrowNav()) closeNavMenu(); });
                    });
                }
                window.addEventListener("resize", function () { if (!isNarrowNav()) closeNavMenu(); }, { passive: true });
                document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeNavMenu(); });
            })();
        })();
    </script>
