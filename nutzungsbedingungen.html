                en: { pageTitle:"Terms of use", updated:"As of: April 3, 2026", nav_features:"Features", nav_about:"About", nav_privacy:"Privacy", nav_imprint:"Imprint", home:"Home", privacy:"Privacy", imprint:"Imprint", terms:"Terms", s1:"1. Scope", s1c:"These terms of use govern the use of the mobile application \"Fishfy\" (hereinafter \"App\").\n\nBy installing and using the App, you accept these terms of use.", s2:"2. Purpose of the app", s2c:"Fishfy is a fishing app that analyses weather data and conditions to provide tactics and forecasts for fishing. This includes activity forecasts and optional notifications (e.g. for good activity or conditions similar to previous catches). The app serves as a decision aid and gives no guarantees for fishing success. In addition, Pro users can manually import old catches (with user-entered time/location and optional historical weather enrichment).", s3:"3. Use", s3c:"• The app may only be used for private, non-commercial purposes.\n• You are responsible for complying with all applicable laws and regulations when fishing.\n• The app does not constitute legal advice.\n• You are responsible for complying with local fishing laws and rules (e.g. closed seasons, minimum sizes, catch limits, bait bans, access rights, restricted zones, fishing licence, permit, day tickets and water regulations).\n• Content, forecasts, scores and tactics in the app do not replace official or club rules or legally binding information. The applicable local regulations always apply.\n• Historically imported catches ('Old catches') are excluded from catch transfer and cannot be transferred to other accounts.", s4:"4. Disclaimer", s4c:"• The app and its tactics are provided \"as is\".\n• No warranty is given for the correctness, completeness or topicality of the information.\n• The app assumes no liability for damage arising from use.\n• Fishing is at your own risk.\n• Use of the app is at your own responsibility, in particular with regard to weather, wa uistheid, volledigheid of actualiteit van de informatie.\n• De app aanvaardt geen aansprakelijkheid voor schade voortvloeiend uit gebruik.\n• Vissen is op eigen risico.\n• Het gebruik van de app is op eigen verantwoordelijkheid, in het bijzonder met betrekking tot weer, wateromstandigheden, toegang tot oevergebieden en persoonlijke veiligheid.\n• Peil-, wind- en prognosegegevens zijn beslissingshulpen en moeten ter plaatse op eigen verantwoordelijkheid worden gecontroleerd.", s5:"5. Privacy", s5c:"De verzameling en verwerking van persoonsgegevens geschiedt in overeenstemming met ons privacybeleid.", s6:"6. Wijzigingen van de app", s6c:"Wij behouden ons het recht voor de app op elk moment te wijzigen, uit te breiden of stop te zetten. Er bestaat geen aanspraak op specifieke functies of beschikbaarheid.", s7:"7. Auteursrecht", s7c:"Alle inhoud van de app, inclusief teksten, afbeeldingen, logo's en software, is beschermd door auteursrecht.", s8:"8. Slotbepalingen", s8c:"Als afzonderlijke bepalingen van deze gebruiksvoorwaarden ongeldig zijn of worden, blijft de geldigheid van de overige bepalingen onverlet.\n\nDuits recht is van toepassing, tenzij dwingende consumentenbeschermingsbepalingen van het land waar je je gewone verblijfplaats hebt anders bepalen.", contact:"Contact", contactText:"Voor vragen over deze voorwaarden kun je contact opnemen via:\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. Alle rechten voorbehouden." },
                fr: { pageTitle:"Conditions d'utilisation", updated:"État : 3 avril 2026", nav_features:"Fonctionnalités", nav_about:"À propos", nav_privacy:"Confidentialité", nav_imprint:"Mentions légales", home:"Accueil", privacy:"Confidentialité", imprint:"Mentions légales", terms:"Conditions", s1:"1. Champ d'application", s1c:"Les présentes conditions d'utilisation régissent l'utilisation de l'application mobile « Fishfy » (ci-après « App »).\n\nEn installant et en utilisant l'App, vous acceptez ces conditions d'utilisation.", s2:"2. Objet de l'app", s2c:"Fishfy est une app de pêche qui analyse les données météo et les conditions pour fournir des tactiques et des prévisions. Cela inclut les prévisions d'activité et des notifications optionnelles (p. ex. bonne activité ou conditions similaires à d'anciennes prises). L'app sert d'aide à la décision et ne donne aucune garantie de succès à la pêche. En plus, les utilisateurs Pro peuvent importer manuellement d'anciennes prises (avec saisie de l'heure/position et enrichissement météo historique optionnel).", s3:"3. Utilisation", s3c:"• L'app ne peut être utilisée qu'à des fins privées et non commerciales.\n• Vous êtes responsable du respect de toutes les lois et réglementations en vigueur lors de la pêche.\n• L'app ne constitue pas un conseil juridique.\n• Vous êtes responsable du respect des lois et règles locales de pêche (p. ex. périodes de fermeture, tailles minimales, limites de prises, interdictions d'appâts, droits d'accès, zones restreintes, permis de pêche, autorisation, cartes journalières et réglementation des eaux).\n• Le contenu, les prévisions, scores et tactiques dans l'app ne remplacent pas les règles officielles ou de club ni les informations juridiquement contraignantes. Les réglementations locales applicables prévalent toujours.\n• Les prises importées historiquement ('Anciennes prises') sont exclues du transfert de prises et ne peuvent pas être transférées vers d'autres comptes.", s4:"4. Avertissement", s4c:"• L'app et ses tactiques sont fournies « en l'état ».\n• Aucune garantie n'est donnée quant à l'exactitude, l'exhaustivité ou l'actualité des informations.\n• L'app n'assume aucune responsabilité pour les dommages résultant de l'utilisation.\n• La pêche est à vos propres risques.\n• L'utilisation de l'app est sous votre propre responsabilité, notamment en ce qui concerne la météo, les conditions de l'eau, l'accès aux berges et la sécurité personnelle.\n• Les informations de niveau d'eau, de vent et de prévision sont des aides à la décision et doivent être vérifiées sur place sous votre propre responsabilité.", s5:"5. Données personnelles", s5c:"La collecte et le traitement des données personnelles sont effectués conformément à notre politique de confidentialité.", s6:"6. Modifications de l'app", s6c:"Nous nous réservons le droit de modifier, d'étendre ou d'arrêter l'app à tout moment. Il n'existe aucun droit à des fonctionnalités ou une disponibilité spécifiques.", s7:"7. Droits d'auteur", s7c:"Tout le contenu de l'app, y compris les textes, graphiques, logos et logiciels, est protégé par le droit d'auteur.", s8:"8. Dispositions finales", s8c:"Si des dispositions individuelles des présentes conditions d'utilisation sont ou deviennent invalides, la validité des autres dispositions reste inchangée.\n\nLe droit allemand s'applique, sauf si des dispositions impératives de protection des consommateurs du pays de votre résidence habituelle en disposent autrement.", contact:"Contact", contactText:"Pour toute question relative aux conditions, contactez-nous à :\n\nsupport@fishfy.app", footerCopy:"© 2026 Apzura. Tous droits réservés." },
                lb: { pageTitle:"Benotzungsbedingungen", updated:"Stand: 3. Abrëll 2026", nav_features:"Funktiounen", nav_about:"Iwwer eis", nav_privacy:"Dateschutz", nav_imprint:"Impressum", home:"Startsäit", privacy:"Dateschutz", imprint:"Impressum", terms:"Benotzungsbedingungen", s1:"1. Gëlungsberäich", s1c:"Dës Benotzungsbedingungen reegelen d'Benotzung vun der mobiler Applikatioun \"Fishfy\" (am Folgenden \"App\").\n\nMat der Installatioun an Benotzung vun der App akzeptéiert dir dës Benotzungsbedingungen.", s2:"2. Zweck vun der App", s2c:"Fishfy ass eng Angel-App, déi Wiederdaten a Bedingungen analyséiert, fir Taktiken a Virsoen fir d'Angelen ze ginn. Dobäi gehéieren ënner anerem Aktivitéitsvirsoen sou wéi optional Notifikatiounen (z.B. bei gudder Aktivitéit oder ähnleche Bedingungen wéi bei fréiere Fäng). D'App déngt als Entscheedungshëllef a gëtt keng Garantien fir Fang-Erfolleg. Zousätzlech kënnen Pro-Benotzer al Fäng manuell importéieren (mat eegener Agab vu Zäit/Positioun an optionaler historescher Wieder-Ergänzung).", s3:"3. Benotzung", s3c:"• D'App darf nëmme fir privat, net-kommerziell Zwecker benotzt ginn.\n• Dir sidd verantwortlech fir d'Respektéierung vun alle gëlende Gesetzer a Veruerdnungen beim Angelen.\n• D'App stellt keng Rechtsberodung duer.\n• Dir sidd selwer verantwortlech, viru Plaz déi jeweileg gëlend Angelgesetzer a Reegelen anzuhalen (z.B. Schonzeiten, Mindestmoossen, Fanglimiten, Këderverbuet, Betrëttsrechter, Sperrzonen, Fëschereischein, Erlabnisschein, Angelkaarten a Gewässeruerdnungen).\n• Inhalter, Virsoen, Scores a Taktiken an der App ersetzen keng behierdlech oder veräinsrechtlech Virgaben a keng rechtsverbindlech Informatiounen. Massgebend sinn ëmmer déi jeweileg gëlend Reegelungen viru Plaz.\n• Historesch importéiert Fäng ('Al Fäng') si vum Fang-Transfer ausgeschloss a kënnen net op aner Konten iwwerdroe ginn.", s4:"4. Haftungsausschluss", s4c:"• D'App an hir Taktike ginn \"wéi gesinn\" zur Verfügung gestallt.\n• Et gëtt keng Ge                 const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.pageTitle;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("updated").textContent = t.updated;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;
                sections.innerHTML = [
                    ["s1","s1c"],["s2","s2c"],["s3","s3c"],["s4","s4c"],["s5","s5c"],["s6","s6c"],["s7","s7c"],["s8","s8c"]
                ].map(([k,ck]) => '<h2>' + escapeHtml(t[k]) + '</h2><div class="section-text">' + escapeHtml(t[ck]).replaceAll("\n","<br>") + '</div>').join("")
                + '<h2>' + escapeHtml(t.contact) + '</h2><div class="info-box">' + escapeHtml(t.contactText).replaceAll("\n","<br>") + '</div>';
            }

            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => { const lang = normalizeLang(event.target.value); localStorage.setItem(storageKey, lang); render(lang); });
        })();
    </script>
</body>
</html>
