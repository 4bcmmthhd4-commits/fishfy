    <script>
        (function () {
            function isReloadNavigation() {
                try {
                    var n = performance.getEntriesByType && performance.getEntriesByType("navigation")[0];
                    if (n && n.type === "reload") return true;
                } catch (e) {}
                try {
                    return performance.navigation && performance.navigation.type === 1;
                } catch (e2) {}
                return false;
            }
            function resetAfterReload() {
                if (!isReloadNavigation()) return;
                try {
                    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
                } catch (e) {}
                var base = location.pathname + location.search;
                if (location.hash) {
                    try {
                        history.replaceState(null, "", base);
                    } catch (e2) {}
                }
                window.scrollTo(0, 0);
            }
            resetAfterReload();
            window.addEventListener(
                "pageshow",
                function (ev) {
                    if (ev.persisted) return;
                    resetAfterReload();
                },
                { passive: true }
            );
            window.addEventListener("load", resetAfterReload, { passive: true });
        })();
    </script>

    <style>
        :root {
            --primary: #0071e3;
            --ink: #1d1d1f;
            --ink-soft: #424245;
            --surface: #f5f5f7;
            --card: #ffffff;
            --line: #e5e5ea;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            color: var(--ink);
            background: var(--surface);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(245, 245, 247, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000; padding: 14px 24px; border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            isolation: isolate;
        }
        .nav-container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .nav-end { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-menu-toggle {
            display: none; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0;
            border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.92); color: var(--ink);
            cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
        }
        .nav-menu-toggle:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .nav-menu-bars { display: flex; flex-direction: column; gap: 5px; width: 18px; }
        .nav-menu-bars span { display: block; height: 2px; background: var(--ink); border-radius: 1px; transition: transform 0.25s ease, opacity 0.2s ease; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        nav.nav-menu-open .nav-menu-bars span:nth-child(2) { opacity: 0; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        #nav-backdrop {
            display: none; position: fixed; inset: 0; z-index: 0; margin: 0; padding: 0; border: none;
            background: rgba(0,0,0,.28); cursor: pointer; opacity: 0; transition: opacity 0.2s ease; -webkit-tap-highlight-color: transparent;
        }
        nav.nav-menu-open #nav-backdrop { display: block; opacity: 1; }
        @media (min-width: 1025px) { #nav-backdrop { display: none !important; } }
        .logo { text-decoration: none; display: flex; align-items: center; gap: 0; }
        .logo-icon { width: 74px; height: 74px; }
        .logo-icon img { display: block; width: 100%; height: 100%; object-fit: contain; }
        .nav-links { display:flex; gap:32px; list-style:none; }
        .nav-links a { color:var(--ink-soft); text-decoration:none; font-weight:500; font-size:15px; transition:color .2s; }
        .nav-links a.active { color: var(--primary); }
        .nav-links a:hover { color:var(--primary); }
        .nav-links a:focus-visible,
        .lang-switcher:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 10px;
        }
        .lang-switcher {
            border: 1px solid var(--line);
            background: rgba(255,255,255,.9);
            color: var(--ink);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;
        }
        .content { max-width: 800px; margin: 0 auto; padding: 138px 24px 80px; }
        h1 { font-size: 36px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing:-0.02em; }
        .last-updated { color: var(--ink-soft); font-size: 14px; margin-bottom: 48px; }
        h2 { font-size: 22px; font-weight: 600; color: var(--ink); margin-top: 48px; margin-bottom: 16px; }
        p { color: var(--ink-soft); margin-bottom: 16px; }
        .info-box { background: var(--card); border:1px solid var(--line); border-radius: 16px; padding: 24px; margin: 24px 0; color: var(--ink-soft); white-space: pre-line; }
        .section-text { color: var(--ink-soft); white-space: pre-line; margin-bottom: 16px; }
        footer { background: #1d1d1f; color: rgba(255, 255, 255, 0.72); padding: 40px 24px; text-align: center; }
        footer a { color: rgba(255, 255, 255, 0.7); text-decoration: none; margin: 0 16px; }
        footer a:hover { color: white; }
        .footer-links { margin-bottom: 24px; }
        .footer-copy { font-size: 13px; opacity: 0.7; }
        @media (max-width: 1024px) {
            .nav-menu-toggle { display: inline-flex; }
            .nav-container { flex-wrap: nowrap; align-items: center; justify-content: space-between; }

            .lang-switcher { height: 44px; padding: 0 12px; box-sizing: border-box; line-height: 44px; }

                max-height: 0; overflow: hidden; opacity: 0;
                transition: max-height 0.32s ease, opacity 0.2s ease, padding 0.2s ease;
                background: rgba(255,255,255,.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid rgba(0,0,0,.06); box-shadow: 0 16px 40px rgba(0,0,0,.1); list-style: none;
            }
            nav.nav-menu-open .nav-links {
                max-height: min(75vh, 440px); opacity: 1; padding: 6px 0 14px; overflow-y: auto; -webkit-overflow-scrolling: touch;
            }
            .nav-links a { display: block; padding: 15px 24px; font-size: 16px; font-weight: 500; border-bottom: 1px solid var(--line); }
            .nav-links li:last-child a { border-bottom: none; }
            body.nav-menu-open-body { overflow: hidden; touch-action: none; }
            .content { padding: 128px 20px 60px; }
            h1 { font-size: 28px; }
            h2 { font-size: 20px; }
        }
        @media (max-width: 420px) {
            .logo { height: 56px; transform: translateY(7px); }
            .logo-icon { width: 54px; height: 54px; }
            .lang-switcher { height: 40px; line-height: 40px; padding: 0 10px; font-size: 13px; }
            .nav-menu-toggle { width: 40px; height: 40px; }
        }

                    s2: "2. Welche Daten wir verarbeiten",
                    s2c: "In Fishfy können folgende Daten verarbeitet werden:\n• Standortdaten (abhängig von Ihrer Freigabe in iOS)\n• Fotos von Fängen (lokal auf dem Gerät)\n• Angelspots und Notizen (lokal auf dem Gerät)\n• Wetterdaten (über Open-Meteo)\n• Fangdaten mit Wetterbedingungen (lokal auf dem Gerät)\n\nGrundsatz:\nAlle Daten bleiben lokal auf Ihrem Gerät. Übermittlungen an externe Systeme erfolgen nur bei aktiv genutzten Funktionen.\n\nExterne Verarbeitung findet nur in folgenden Fällen statt:\n• Open-Meteo: Abruf von Wetterdaten\n• Push-Benachrichtigungen (Pro): Übermittlung von Geräte-Token und Einstellungen an Firebase (Google)\n• Cloud-Synchronisation (Pro, optional): Verarbeitung und Speicherung von Fängen und Spots auf Firebase-Servern (Google)\n• Import alter Fänge (Pro, optional): Verarbeitung ausgewählter Fotos, manuell eingegebener Daten und historischer Wetterdaten\n• Freiwillige Datenweitergabe (optional, siehe Abschnitt 6): Übermittlung von Fangdaten inkl. Fangfotos\n\nKontodaten:\nBei Kontonutzung (Apple, Google, E-Mail) werden insbesondere E-Mail-Adresse, Provider-Kennung, technische Konto-ID und der bei Erstellung vergebene Nutzername verarbeitet. Der Nutzername dient als pseudonyme Kennung, ist derzeit nicht änderbar.\n\nRechtsgrundlagen (Art. 6 DSGVO):\n• Bereitstellung der App-Funktionen und Kontoverwaltung: Art. 6 Abs. 1 lit. b DSGVO\n• IT-Sicherheit, Missbrauchsschutz und Stabilität: Art. 6 Abs. 1 lit. f DSGVO\n• Freiwillige Datenweitergabe und E-Mail-Marketing (News & Updates): Art. 6 Abs. 1 lit. a DSGVO. Ihre Auswahl zur E-Mail-Kommunikation treffen Sie bei der Registrierung; sie kann jederzeit in der App geändert und mit Wirkung für die Zukunft widerrufen werden.\n\nSpeicherdauer (allgemein):\nPersonenbezogene Daten speichern wir nur so lange, wie es für die jeweiligen Zwecke erforderlich ist oder gesetzliche Aufbewahrungspflichten bestehen.",
                    s3: "3. Standortdaten, Wetter- und Pegeldaten",
                    s3c: "Standortdaten werden für folgende Funktionen genutzt:\n• Abruf von Wetterdaten am aktuellen Standort\n• Markierung von Angelspots\n• Dokumentation von Fangpositionen\n• Pro-Funktion „Spot belegt“ (Anwesenheit im Umkreis von 100 m)\n\nSie entscheiden selbst in den iOS-Einstellungen über die Standortfreigabe. Es erfolgt keine dauerhafte Hintergrundverfolgung. Gespeicherte Standortbezüge in Fängen und Spots bleiben lokal. Berechtigungen können jederzeit geändert oder entzogen werden.\n\nBei aktiver Funktion „Spot belegt“:\n• Standortprüfung in Intervallen zur Bestimmung der Anwesenheit im 100-m-Umkreis\n• Anzeige als Belegt-Status mit Zähler, sichtbar nur für Pro-Nutzer\n• Verarbeitung nur bei aktivierter Funktion und erteilter Berechtigung\n• Bei „Beim Verwenden“: Check-ins in Intervallen; ohne Bestätigung wird die Belegung automatisch beendet\n• Bei „Immer“: Standortprüfung in Intervallen mit zeitlich begrenzten Sicherungs- und Abschaltlogiken\n• Bei komplett geschlossenem App-Prozess wird der Status serverseitig zeitnah zurückgesetzt\n\nSicherheitsrahmen für „Spot belegt“:\n• Verarbeitung über abgesicherte Cloud-Funktionen\n• Kein direkter Client-Zugriff auf zugrunde liegende Presence-Sammlungen\n• Missbrauchsschutz durch u.a. Authentifizierung, serverseitige Prüfungen und zeitlich begrenzte Sessions\n\nWetter- und Pegeldaten:\n• Wetterdaten über Open-Meteo\n• Für Pegeldaten werden Spot-Koordinaten und ggf. Ländercode an den Fishfy-Backenddienst übermittelt\n• Der Dienst liefert aktuelle Wasserstände aus angebundenen Quellen, u.a.: PEGELONLINE, Rijkswaterstaat WaterWebservices, eHYD, BAFU-Hydrodaten, HUBEAU, WATERINFO/HIC, Hydrométrie Wallonie KiWIS, BRUWATER Open Data, Héichwaasser\n• Diese Daten dienen ausschließlich der Funktionsbereitstellung.",
                    s4: "4. Kamera & Fotobibliothek",
                    s4c: "Die Kamera dient der Aufnahme von Fangfotos. Diese werden standardmäßig lokal gespeichert.\nOptional kann Zugriff auf die Fotobibliothek erfolgen.\nFotos verlassen das Gerät nur bei aktivierter freiwilliger Datenweitergabe (Abschnitt 6).",
                    s5: "5. Cloud-Funktionen (Pro)",
                    s5c: "Folgende Cloud-Funktionen können genutzt werden:\n• Push-Benachrichtigungen (Firebase/Google)\n• Cloud-Synchronisation (optional; Firebase/Google)\n• Import alter Fänge (optional; Integration von Fotos und historischen Wetterdaten)\n\nHinweis:\nHistorisch importierte Fänge sind vom Fang-Transfer ausgeschlossen.",
                    s6: "6. Freiwillige Datenweitergabe",
                    s6c: "Die freiwillige Datenweitergabe dient der Analyse und Verbesserung der App. Sie wird beim ersten Start angeboten und kann jederzeit in den Einstellungen geändert werden.\n\nÜbertragen werden können:\n• Fangdaten\n• Wetter-/Bedingungsdaten\n• Fotos\n\nWichtiger Hinweis:\nDiese Daten können personenbezogen sein, insbesondere durch Standortbezug oder Bildinhalte.\n\nVerarbeitung:\n• Über technische Dienstleister\n• Analyse ausschließlich intern\n• Keine Weitergabe von Analyseergebnissen an unabhängige Dritte zu deren eigenen Zwecken\n\nBildnutzung:\n• Bilder ohne erkennbare Personen können für Social Media/App-Bewerbung genutzt werden\n• Gesichter und sensible Standortmerkmale werden vor Nutzung unkenntlich gemacht bzw. verpixelt\n\nWiderruf:\n• Jederzeit möglich über die Einstellungen\n• Wirkt für die Zukunft",
                    s7: "7. Ihre Rechte (DSGVO)",
                    s7c: "Sie haben folgende Rechte:\n• Auskunft\n• Berichtigung\n• Löschung\n• Einschränkung der Verarbeitung\n• Widerspruch\n• Datenübertragbarkeit\n• Widerruf Ihrer Einwilligung\n• Beschwerde bei einer Aufsichtsbehörde\n\nZur Funktion „Alle Daten löschen“:\nDie Funktion entfernt lokale Daten und — falls genutzt — Cloud-Daten in Ihrem Fishfy/Firebase-Konto. Bereits aus Abschnitt 6 an externe Systeme übermittelte Daten können nicht automatisch überall gelöscht werden. Anfragen bitte an: support@fishfy.app\n\nZusatzhinweise:\n• Bei Deinstallation werden lokal gespeicherte Daten gelöscht\n• Der Nutzername ist derzeit nicht änderbar",

                en: {

                    nav_privacy: "Privacy",

                    s1: "1. Controller",
                    s1c: "Controller responsible for data processing:\nApzura\nHafenstraße 39, 67346 Speyer\nEmail: support@fishfy.app",
                    s2: "2. What data we process",
                    s2c: "The following data may be processed in Fishfy:\n\nLocation data (depending on your iOS permission)\nCatch photos (stored locally on the device)\nFishing spots and notes (stored locally on the device)\nWeather data (via Open-Meteo)\nCatch data with weather conditions (stored locally on the device)\n\nPrinciple:\nAll data remains on your device. Transfers to external systems only happen when related features are actively used.\n\nExternal processing only takes place in these cases:\n\nOpen-Meteo: retrieval of weather data\nPush notifications (Pro): transfer of device token and settings to Firebase (Google)\nCloud sync (Pro, optional): processing and storage of catches and spots on Firebase servers (Google)\nOld catch import (Pro, optional): processing of selected photos, manually entered data, and historical weather data\nVoluntary data sharing (optional, see section 6): transfer of catch data including catch photos\n\nAccount data:\nWhen using an account (Apple, Google, email), this includes email address, provider identifier, technical account ID, and the username assigned during registration. The username is a pseudonymous identifier and is currently not editable.\n\nLegal basis (Art. 6 GDPR):\n• Provision of app features and account management: Art. 6(1)(b) GDPR\n• IT security, abuse prevention, and stability: Art. 6(1)(f) GDPR\n• Voluntary data sharing and email marketing (News & Updates): Art. 6(1)(a) GDPR. You make your email communication choice during registration; it can be changed at any time in the app and withdrawn with effect for the future.\n\nStorage period (general):\nWe store personal data only as long as necessary for the respective purposes or as required by law.",
                    s3: "3. Location, weather, and water-level data",
                    s3c: "Location data is used for the following functions:\n\nRetrieving weather data for your current location\nMarking fishing spots\nDocumenting catch locations\nPro feature “Spot Occupied” (presence within a 100 m radius)\nYou control location permission in iOS settings. There is no continuous background tracking. Stored location references in catches and spots remain local. Permissions can be changed or revoked at any time.\n\nWhen “Spot Occupied” is active:\n\nLocation checks at intervals to determine presence within 100 m\nOccupied status shown with counter, visible only to Pro users\nProcessing only when the feature is enabled and permission is granted\nWith “While Using”: check-ins at intervals; without confirmation, occupied status ends automatically\nWith “Always”: interval checks with time-limited fallback and shutdown logic\nIf the app process is fully closed, status is reset on the server shortly after\nSecurity framework for “Spot Occupied”:\n\nProcessing via secured cloud functions\nNo direct client access to underlying presence collections\nAnti-abuse safeguards including authentication, server-side checks, and time-limited sessions\nWeather and water-level data:\n\nWeather data via Open-Meteo\nFor water levels, spot coordinates and country code (if available) are sent to the Fishfy backend\nThe service returns current levels from connected sources, including: PEGELONLINE, Rijkswaterstaat WaterWebservices, eHYD, FOEN/BAFU hydrology data, HUBEAU, WATERINFO/HIC, Hydrométrie Wallonie KiWIS, BRUWATER Open Data, Héichwaasser\nThese data are used only to provide app functionality.",
                    s4: "4. Camera & photo library",
                    s4c: "The camera is used to capture catch photos. These are stored locally by default.\nOptional photo-library access can be granted.\nPhotos leave the device only when voluntary data sharing is enabled (section 6).",
                    s5: "5. Cloud features (Pro)",
                    s5c: "The following cloud features may be used:\n\nPush notifications (Firebase/Google)\nCloud sync (optional; Firebase/Google)\nOld catch import (optional; integration of photos and historical weather data)\nNote:\nHistorically imported catches are excluded from catch transfer.",
                    s6: "6. Voluntary data sharing",
                    s6c: "Voluntary data sharing is used to analyze and improve the app.\nIt is offered on first launch and can be changed at any time in settings.\n\nThe following may be transferred:\n\nCatch data\nWeather/condition data\nPhotos\nImportant note:\nThese data may be personal data, especially due to location reference or image content.\n\nProcessing:\n\nVia technical service providers\nAnalysis only internally\nNo sharing of analysis results with independent third parties for their own purposes\nImage use:\n\nImages without recognizable persons may be used for social media/app promotion\nFaces and sensitive location details are obscured/pixelated before use\nWithdrawal:\n\nPossible at any time in settings\nApplies to future processing",
                    s7: "7. Your rights (GDPR)",
                    s7c: "You have the following rights:\n\nAccess\nRectification\nErasure\nRestriction of processing\nObjection\nData portability\nWithdrawal of your consent\nComplaint to a supervisory authority\nAbout “Delete all data”:\nThis function removes local data and — if used — cloud data in your Fishfy/Firebase account. Data already sent to external systems under section 6 cannot be removed everywhere automatically. Requests: support@fishfy.app\n\nAdditional notes:\n\nLocally stored data is deleted when uninstalling the app\nThe username is currently not editable",

                    s1: "1. Verantwoordelijke",
                    s1c: "Verantwoordelijk voor de gegevensverwerking:\nApzura\nHafenstraße 39, 67346 Speyer\nE-mail: support@fishfy.app",
                    s2: "2. Welke gegevens wij verwerken",
                    s2c: "In Fishfy kunnen de volgende gegevens worden verwerkt:\n\nLocatiegegevens (afhankelijk van uw iOS-toestemming)\nFoto's van vangsten (lokaal op het apparaat opgeslagen)\nVisstekken en notities (lokaal op het apparaat opgeslagen)\nWeergegevens (via Open-Meteo)\nVangstgegevens met weersomstandigheden (lokaal op het apparaat opgeslagen)\n\nPrincipe:\nAlle gegevens blijven op uw apparaat. Overdracht naar externe systemen gebeurt alleen wanneer bijbehorende functies actief worden gebruikt.\n\nExterne verwerking vindt alleen plaats in de volgende gevallen:\n\nOpen-Meteo: ophalen van weergegevens\nPushmeldingen (Pro): overdracht van apparaattoken en instellingen naar Firebase (Google)\nCloudsynchronisatie (Pro, optioneel): verwerking en opslag van vangsten en stekken op Firebase-servers (Google)\nImport van oude vangsten (Pro, optioneel): verwerking van geselecteerde foto's, handmatig ingevoerde gegevens en historische weergegevens\nVrijwillige gegevensdeling (optioneel, zie sectie 6): overdracht van vangstgegevens inclusief foto's\n\nAccountgegevens:\nBij gebruik van een account (Apple, Google, e-mail) worden met name e-mailadres, provider-identificatie, technische account-ID en de bij registratie gekozen gebruikersnaam verwerkt. De gebruikersnaam dient als pseudonieme identificatie en is momenteel niet wijzigbaar.\n\nRechtsgrondslagen (art. 6 AVG):\n• Levering van app-functies en accountbeheer: art. 6 lid 1 onder b AVG\n• IT-beveiliging, misbruikpreventie en stabiliteit: art. 6 lid 1 onder f AVG\n• Vrijwillige gegevensdeling en e-mailmarketing (News & Updates): art. 6 lid 1 onder a AVG. Uw keuze voor e-mailcommunicatie maakt u tijdens de registratie; deze kan op elk moment in de app worden aangepast en met werking voor de toekomst worden ingetrokken.\n\nBewaartermijn (algemeen):\nWij bewaren persoonsgegevens alleen zolang dit nodig is voor de betreffende doeleinden of zolang een wettelijke bewaarplicht bestaat.",
                    s3: "3. Locatie-, weer- en peilgegevens",
                    s3c: "Locatiegegevens worden gebruikt voor de volgende functies:\n\nOphalen van weergegevens op uw huidige locatie\nMarkeren van visstekken\nVastleggen van vangstlocaties\nPro-functie “Spot bezet” (aanwezigheid binnen een straal van 100 m)\nU beheert locatie-toestemming in de iOS-instellingen. Er is geen permanente achtergrondtracking. Opgeslagen locatiereferenties in vangsten en stekken blijven lokaal. Toestemmingen kunnen op elk moment worden aangepast of ingetrokken.\n\nWanneer “Spot bezet” actief is:\n\nLocatiecontrole met intervallen om aanwezigheid binnen 100 m te bepalen\nBezet-status met teller, alleen zichtbaar voor Pro-gebruikers\nVerwerking alleen wanneer de functie is ingeschakeld en toestemming is verleend\nBij “Bij gebruik”: check-ins met intervallen; zonder bevestiging stopt de bezet-status automatisch\nBij “Altijd”: intervalcontroles met tijdgebonden fallback- en uitschakellogica\nAls het app-proces volledig is afgesloten, wordt de status kort daarna server-side gereset\nBeveiligingskader voor “Spot bezet”:\n\nVerwerking via beveiligde cloudfuncties\nGeen directe clienttoegang tot onderliggende presence-collecties\nAnti-misbruikmaatregelen, o.a. authenticatie, server-side controles en tijdgebonden sessies\nWeer- en peilgegevens:\n\nWeergegevens via Open-Meteo\nVoor peilgegevens worden spotcoördinaten en, indien beschikbaar, landcode naar de Fishfy-backend gestuurd\nDe dienst levert actuele waterstanden uit gekoppelde bronnen, o.a.: PEGELONLINE, Rijkswaterstaat WaterWebservices, eHYD, BAFU-hydrologiedata, HUBEAU, WATERINFO/HIC, Hydrométrie Wallonie KiWIS, BRUWATER Open Data, Héichwaasser\nDeze gegevens worden uitsluitend gebruikt voor appfunctionaliteit.",
                    s4: "4. Camera en fotobibliotheek",
                    s4c: "De camera wordt gebruikt voor vangstfoto's. Deze worden standaard lokaal opgeslagen.\nOptioneel kan toegang tot de fotobibliotheek worden verleend.\nFoto's verlaten het apparaat alleen wanneer vrijwillige gegevensdeling is ingeschakeld (sectie 6).",
                    s5: "5. Cloudfuncties (Pro)",
                    s5c: "De volgende cloudfuncties kunnen worden gebruikt:\n\nPushmeldingen (Firebase/Google)\nCloudsynchronisatie (optioneel; Firebase/Google)\nImport van oude vangsten (optioneel; integratie van foto's en historische weergegevens)\nOpmerking:\nHistorisch geïmporteerde vangsten zijn uitgesloten van vangstoverdracht.",
                    s6: "6. Vrijwillige gegevensdeling",
                    s6c: "Vrijwillige gegevensdeling wordt gebruikt om de app te analyseren en te verbeteren.\nDeze optie wordt aangeboden bij de eerste start en kan op elk moment in de instellingen worden aangepast.\n\nHet volgende kan worden overgedragen:\n\nVangstgegevens\nWeer-/conditiegegevens\nFoto's\nBelangrijke opmerking:\nDeze gegevens kunnen persoonsgegevens zijn, met name door locatieverwijzingen of beeldinhoud.\n\nVerwerking:\n\nVia technische dienstverleners\nAnalyse uitsluitend intern\nGeen doorgifte van analyseresultaten aan onafhankelijke derden voor hun eigen doeleinden\nGebruik van beelden:\n\nBeelden zonder herkenbare personen kunnen worden gebruikt voor social media en app-promotie\nGezichten en gevoelige locatiekenmerken worden voor gebruik onherkenbaar gemaakt/gepixeld\nIntrekking:\n\nAltijd mogelijk via instellingen\nGeldt voor toekomstige verwerking",
                    s7: "7. Uw rechten (AVG)",
                    s7c: "U heeft de volgende rechten:\n\nInzage\nCorrectie\nWissing\nBeperking van verwerking\nBezwaar\nGegevensoverdraagbaarheid\nIntrekking van uw toestemming\nKlacht bij een toezichthoudende autoriteit\nOver “Alle gegevens verwijderen”:\nDeze functie verwijdert lokale gegevens en — indien gebruikt — cloudgegevens in uw Fishfy/Firebase-account. Gegevens die onder sectie 6 al naar externe systemen zijn verzonden, kunnen niet overal automatisch worden verwijderd. Verzoeken: support@fishfy.app\n\nAanvullende opmerkingen:\n\nLokaal opgeslagen gegevens worden verwijderd bij de-installatie\nDe gebruikersnaam is momenteel niet wijzigbaar",

                    s1: "1. Responsable",

                    s2: "2. Données traitées",
                    s2c: "Dans Fishfy, les données suivantes peuvent être traitées :\n\nDonnées de localisation (selon votre autorisation iOS)\nPhotos de prises (stockées localement sur l'appareil)\nSpots de pêche et notes (stockés localement sur l'appareil)\nDonnées météo (via Open-Meteo)\nDonnées de prises avec conditions météo (stockées localement sur l'appareil)\n\nPrincipe :\nToutes les données restent sur votre appareil. Les transferts vers des systèmes externes n'ont lieu que lorsque les fonctions concernées sont activement utilisées.\n\nTraitement externe uniquement dans les cas suivants :\n\nOpen-Meteo : récupération des données météo\nNotifications push (Pro) : transfert du jeton d'appareil et des réglages vers Firebase (Google)\nSynchronisation cloud (Pro, optionnel) : traitement et stockage des prises et spots sur les serveurs Firebase (Google)\nImport d'anciennes prises (Pro, optionnel) : traitement de photos sélectionnées, de données saisies manuellement et de données météo historiques\nPartage volontaire de données (optionnel, voir section 6) : transfert de données de prises, y compris les photos\n\nDonnées de compte :\nLors de l'utilisation d'un compte (Apple, Google, e-mail), sont notamment traités l'adresse e-mail, l'identifiant du fournisseur, l'ID technique du compte et le nom d'utilisateur attribué lors de la création. Le nom d'utilisateur sert d'identifiant pseudonyme et n'est actuellement pas modifiable.\n\nBases juridiques (art. 6 RGPD) :\n• Fourniture des fonctions de l'app et gestion du compte : art. 6, par. 1, let. b RGPD\n• Sécurité informatique, prévention des abus et stabilité : art. 6, par. 1, let. f RGPD\n• Partage volontaire de données et marketing par e-mail (News & Updates) : art. 6, par. 1, let. a RGPD. Votre choix concernant la communication par e-mail est effectué lors de l'inscription ; il peut être modifié à tout moment dans l'app et retiré avec effet pour l'avenir.\n\nDurée de conservation (général) :\nNous conservons les données personnelles uniquement aussi longtemps que nécessaire pour les finalités concernées ou aussi longtemps qu'une obligation légale l'exige.",
                    s3: "3. Localisation, météo et niveaux d'eau",
                    s3c: "Les données de localisation sont utilisées pour les fonctions suivantes :\n\nRécupération des données météo à votre position actuelle\nMarquage des spots de pêche\nDocumentation des lieux de prise\nFonction Pro « Spot occupé » (présence dans un rayon de 100 m)\nVous gérez l'autorisation de localisation dans les réglages iOS. Il n'y a pas de suivi permanent en arrière-plan. Les références de localisation stockées dans les prises et spots restent locales. Les autorisations peuvent être modifiées ou retirées à tout moment.\n\nQuand « Spot occupé » est actif :\n\nVérification de la localisation à intervalles pour déterminer la présence dans un rayon de 100 m\nAffichage du statut occupé avec compteur, visible uniquement pour les utilisateurs Pro\nTraitement uniquement lorsque la fonction est activée et l'autorisation accordée\nAvec « Pendant l'utilisation » : check-ins à intervalles ; sans confirmation, le statut occupé est arrêté automatiquement\nAvec « Toujours » : vérification à intervalles avec logiques temporisées de secours et d'arrêt\nSi le processus de l'app est complètement fermé, le statut est réinitialisé côté serveur peu après\nCadre de sécurité pour « Spot occupé » :\n\nTraitement via des fonctions cloud sécurisées\nAucun accès client direct aux collections de présence sous-jacentes\nMesures anti-abus, notamment authentification, contrôles côté serveur et sessions à durée limitée\nDonnées météo et niveaux d'eau :\n\nDonnées météo via Open-Meteo\nPour les niveaux d'eau, les coordonnées du spot et, si disponible, le code pays sont transmises au backend Fishfy\nLe service renvoie les niveaux actuels depuis des sources connectées, notamment : PEGELONLINE, Rijkswaterstaat WaterWebservices, eHYD, données hydrologiques OFEV/BAFU, HUBEAU, WATERINFO/HIC, Hydrométrie Wallonie KiWIS, BRUWATER Open Data, Héichwaasser\nCes données servent uniquement à fournir les fonctions de l'app.",
                    s4: "4. Camera et phototheque",
                    s4c: "La caméra est utilisée pour les photos de prises. Ces photos sont stockées localement par défaut.\nUn accès optionnel à la photothèque peut être autorisé.\nLes photos quittent l'appareil uniquement si le partage volontaire des données est activé (section 6).",
                    s5: "5. Fonctions cloud (Pro)",
                    s5c: "Les fonctions cloud suivantes peuvent être utilisées :\n\nNotifications push (Firebase/Google)\nSynchronisation cloud (optionnelle ; Firebase/Google)\nImport d'anciennes prises (optionnel ; intégration de photos et de données météo historiques)\nRemarque :\nLes prises importées historiquement sont exclues du transfert de prises.",
                    s6: "6. Partage volontaire de donnees",
                    s6c: "Le partage volontaire des données sert à analyser et améliorer l'app.\nIl est proposé au premier démarrage et peut être modifié à tout moment dans les réglages.\n\nLes éléments suivants peuvent être transférés :\n\nDonnées de prises\nDonnées météo/conditions\nPhotos\nRemarque importante :\nCes données peuvent être des données personnelles, notamment en raison de la localisation ou du contenu des images.\n\nTraitement :\n\nVia des prestataires techniques\nAnalyses uniquement en interne\nAucun partage des résultats d'analyse avec des tiers indépendants pour leurs propres finalités\nUtilisation des images :\n\nLes images sans personnes reconnaissables peuvent être utilisées pour les réseaux sociaux/la promotion de l'app\nLes visages et les éléments de localisation sensibles sont rendus non identifiables/pixelisés avant utilisation\nRetrait du consentement :\n\nPossible à tout moment dans les réglages\nS'applique aux traitements futurs",
                    s7: "7. Vos droits (RGPD)",
                    s7c: "Vous disposez des droits suivants :\n\nAccès\nRectification\nEffacement\nLimitation du traitement\nOpposition\nPortabilité\nRetrait de votre consentement\nRéclamation auprès d'une autorité de contrôle\nÀ propos de « Supprimer toutes les données » :\nCette fonction supprime les données locales et — si utilisées — les données cloud de votre compte Fishfy/Firebase. Les données déjà transmises à des systèmes externes au titre de la section 6 ne peuvent pas être supprimées automatiquement partout. Demandes : support@fishfy.app\n\nInformations complémentaires :\n\nLes données locales sont supprimées lors de la désinstallation\nLe nom d'utilisateur n'est actuellement pas modifiable",

                    s2: "2. Wéi Donnéeë mir verschaffen",
                    s2c: "An Fishfy kënnen dës Donnéeë verschafft ginn:\n\nStanduertdaten (ofhängeg vun Ärer iOS-Fräigab)\nFotoe vu Fäng (lokal um Apparat gespäichert)\nAngelspots a Notizen (lokal um Apparat gespäichert)\nWiederdaten (iwwer Open-Meteo)\nFangdaten mat Wiederbedingungen (lokal um Apparat gespäichert)\n\nGrondsaz:\nAll Donnéeë bleiwen um Apparat. Iwwerdroungen un extern Systemer geschéien nëmmen, wann entspriechend Funktiounen aktiv benotzt ginn.\n\nExtern Veraarbechtung nëmmen an dëse Fäll:\n\nOpen-Meteo: Ofruff vu Wiederdaten\nPush-Notifikatiounen (Pro): Iwwerdroung vum Apparat-Token an Astellungen un Firebase (Google)\nCloud-Synchronisatioun (Pro, optional): Veraarbechtung a Späicherung vu Fäng a Spots op Firebase-Serveren (Google)\nImport vun ale Fäng (Pro, optional): Veraarbechtung vun ausgewielte Fotoen, manuell aginnen Donnéeën an historesche Wiederdaten\nFräiwëlleg Donnéeëweidergab (optional, kuck Abschnitt 6): Iwwerdroung vu Fangdaten inklusiv Fotoen\n\nKontodonnéeën:\nBei der Benotzung vun engem Kont (Apple, Google, E-Mail) ginn ënner anerem E-Mail-Adress, Provider-Kennung, technesch Konto-ID an de bei der Registréierung festgeluechte Benotzernumm verschafft. De Benotzernumm déngt als pseudonym Kennung an ass aktuell net ännerbar.\n\nRechtsgrondlagen (Art. 6 DSGVO):\n• Bereetstellung vun den App-Funktiounen a Kontoverwaltung: Art. 6 Abs. 1 lit. b DSGVO\n• IT-Sécherheet, Mëssbrauchsschutz a Stabilitéit: Art. 6 Abs. 1 lit. f DSGVO\n• Fräiwëlleg Donnéeëweidergab an E-Mail-Marketing (News & Updates): Art. 6 Abs. 1 lit. a DSGVO. Är Auswiel fir E-Mail-Kommunikatioun trefft Dir bei der Registréierung; si kann zu all Moment an der App geännert an mat Wierkung fir d'Zukunft zréckgezunn ginn.\n\nSpäicherdauer (allgemeng):\nPersounebezunnen Donnéeë späichere mir nëmme soulaang, wéi et fir déi jeweileg Zwecker néideg ass oder gesetzlech Opbewahrungspflichte bestinn.",
                    s3: "3. Standuert-, Wieder- a Pegeldonnéeën",
                    s3c: "Standuertdaten gi fir folgend Funktioune benotzt:\n\nOfruff vu Wiederdaten um aktuelle Standuert\nMarkéiere vun Angelspots\nDokumentatioun vu Fangpositiounen\nPro-Funktioun „Spot besat“ (Präsenz am Radius vu 100 m)\nDir steiert d'Standuertfräigab an den iOS-Astellungen. Et gëtt keng dauerhaft Hannergrondverfolgung. Gespäichert Standuertbezich an Fäng a Spots bleiwen lokal. Berechtegunge kënnen zu all Zäit geännert oder entzunn ginn.\n\nWann „Spot besat“ aktiv ass:\n\nStanduertkontrolle mat Intervaller fir Präsenz am 100-m-Radius ze bestëmmen\nBesat-Status mat Zueler, nëmme fir Pro-Benotzer siichtbar\nVeraarbechtung nëmmen wann d'Funktioun aktiv ass an d'Berechtegung virläit\nBei „Beim Benotzen“: Check-ins mat Intervaller; ouni Confirmatioun gëtt de Besat-Status automatesch gestoppt\nBei „Ëmmer“: Intervallkontrollen mat zäitbegrenzter Fallback- an Ausschaltlogik\nWann den App-Prozess komplett zou ass, gëtt de Status kuerz duerno serversäiteg zréckgesat\nSécherheetskader fir „Spot besat“:\n\nVeraarbechtung iwwer ofgeséchert Cloud-Funktiounen\nKeen direkte Client-Zougrëff op ënnerläit Presence-Sammlungen\nAnti-Mëssbrauchsmoossnamen, ë.a. Authentifikatioun, serversäiteg Kontrollen a zäitlimitéiert Sessiounen\nWieder- a Pegeldonnéeën:\n\nWiederdaten iwwer Open-Meteo\nFir Pegeldonnéeë ginn Spot-Koordinaten an, wann disponibel, de Lännercode un de Fishfy-Backend geschéckt\nDe Service liwwert aktuell Waasserstänn aus ugeschlossene Quellen, ë.a.: PEGELONLINE, Rijkswaterstaat WaterWebservices, eHYD, BAFU-Hydrodonnéeën, HUBEAU, WATERINFO/HIC, Hydrométrie Wallonie KiWIS, BRUWATER Open Data, Héichwaasser\nDës Donnéeë déngen exklusiv der Funktiounsbereetstellung.",

                    s5: "5. Cloud-Funktiounen (Pro)",
                    s5c: "Folgend Cloud-Funktioune kënne benotzt ginn:\n\nPush-Notifikatiounen (Firebase/Google)\nCloud-Synchronisatioun (optional; Firebase/Google)\nImport vun ale Fäng (optional; Integratioun vu Fotoen an historesche Wiederdaten)\nHinweis:\nHistoresch importéiert Fäng si vum Fang-Transfer ausgeschloss.",
                    s6: "6. Fräiwëlleg Donnéeëweidergab",
                    s6c: "D fräiwëlleg Donnéeëweidergab déngt der Analyse an der Verbesserung vun der App.\nSi gëtt beim éischte Start ugebueden a kann an den Astellungen zu all Zäit geännert ginn.\n\nFolgend Donnéeë kënnen iwwerdroe ginn:\n\nFangdaten\nWieder-/Bedingungsdaten\nFotoen\nWichtegen Hinweis:\nDës Donnéeë kënnen perséinlech Donnéeë sinn, besonnesch wéinst Standuertbezug oder Bildinhalt.\n\nVeraarbechtung:\n\nIwwer technesch Déngschtleeschter\nAnalyse exklusiv intern\nKeng Weidergab vun Analyse-Resultater un onofhängeg Drëtter fir hir eege Zwecker\nBildnotzung:\n\nBiller ouni erkennbar Persoune kënne fir Social Media/App-Bewerbung benotzt ginn\nGesiichter a sensibel Standuertmerkmale ginn virun der Notzung onkenntlech gemaach/verpixelt\nWiderruf:\n\nZu all Zäit iwwer d'Astellungen méiglech\nGëllt fir zukünfteg Veraarbechtung",

            function normalizeLang(input) {
                if (!input) return FALLBACK;
                const value = input.toLowerCase();
                if (value.startsWith("lb") || value.startsWith("lu")) return "lb";
                const base = value.split("-")[0];
                return SUPPORTED.includes(base) ? base : FALLBACK;
            }

            function escapeHtml(text) {
                return text
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;");
            }

                const t = content[lang] || content[FALLBACK];
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (toggle && t.nav_aria_menu && t.nav_aria_close) {
                    toggle.setAttribute(
                        "aria-label",
                        window.__fishfyNavOpen ? t.nav_aria_close : t.nav_aria_menu
                    );
                }
                if (backdrop && t.nav_aria_backdrop) {
                    backdrop.setAttribute("aria-label", t.nav_aria_backdrop);
                    backdrop.setAttribute("aria-hidden", window.__fishfyNavOpen ? "false" : "true");
                }
            }

            function render(lang) {
                const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.privacy;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("updated").textContent = t.updated;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;

                applyNavMenuLabels(lang);

                sections.innerHTML = [
                    ["s1", "s1c", true],
                    ["s2", "s2c", false],
                    ["s3", "s3c", false],
                    ["s4", "s4c", false],
                    ["s5", "s5c", false],
                    ["s6", "s6c", false],
                    ["s7", "s7c", false],
                    ["s8", "s8c", false],
                    ["s9", "s9c", true]
                ].filter(([titleKey, contentKey]) => (t[titleKey] || "").trim() && (t[contentKey] || "").trim())
                  .map(([titleKey, contentKey, boxed]) => {
                    const block = '<h2>' + escapeHtml(t[titleKey]) + '</h2>';
                    const text = escapeHtml(t[contentKey]).replaceAll("\n", "<br>");
                    return block + (boxed ? '<div class="info-box">' + text + '</div>' : '<div class="section-text">' + text + '</div>');
                }).join("");
            }

            window.__fishfyNavOpen = false;

            function isNarrowNav() {
                return window.matchMedia("(max-width: 1024px)").matches;
            }

            function setNavMenuOpen(open) {
                const nav = document.getElementById("site-nav");
                const toggle = document.getElementById("nav-menu-toggle");
                if (!nav || !toggle) return;
                window.__fishfyNavOpen = !!open;
                nav.classList.toggle("nav-menu-open", window.__fishfyNavOpen);
                document.body.classList.toggle("nav-menu-open-body", window.__fishfyNavOpen);
                toggle.setAttribute("aria-expanded", window.__fishfyNavOpen ? "true" : "false");
                const lang = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
                applyNavMenuLabels(lang);
            }

            function closeNavMenu() {
                if (window.__fishfyNavOpen) setNavMenuOpen(false);
            }

            function toggleNavMenu() {
                if (!isNarrowNav()) return;
                setNavMenuOpen(!window.__fishfyNavOpen);
            }

            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => {
                const lang = normalizeLang(event.target.value);
                localStorage.setItem(storageKey, lang);
                render(lang);
            });

            (function initMobileNav() {
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (!toggle) return;
                toggle.addEventListener("click", function (e) {
                    e.stopPropagation();
                    toggleNavMenu();
                });
                if (backdrop) backdrop.addEventListener("click", closeNavMenu);
                const panel = document.getElementById("primary-nav");
                if (panel) {
                    panel.querySelectorAll("a").forEach(function (link) {
                        link.addEventListener("click", function () {
                            if (isNarrowNav()) closeNavMenu();
                        });
                    });
                }
                window.addEventListener("resize", function () {
                    if (!isNarrowNav()) closeNavMenu();
                }, { passive: true });
                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") closeNavMenu();
                });
            })();
        })();
    </script>
</body>
</html>
