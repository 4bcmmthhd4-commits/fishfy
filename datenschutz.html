    <script>
        (function () {
            function isReloadNavigation() {
                try {
                    var n = performance.getEntriesByType && performance.getEntriesByType("navigation")[0];
                    if (n && n.type === "reload") return true;
                } catch (e) {}
                try {
                    return performance.navigation && performance.navigation.type === 1;
                } catch (e2) {}
                return false;
            }
            function resetAfterReload() {
                if (!isReloadNavigation()) return;
                try {
                    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
                } catch (e) {}
                var base = location.pathname + location.search;
                if (location.hash) {
                    try {
                        history.replaceState(null, "", base);
                    } catch (e2) {}
                }
                window.scrollTo(0, 0);
            }
            resetAfterReload();
            window.addEventListener(
                "pageshow",
                function (ev) {
                    if (ev.persisted) return;
                    resetAfterReload();
                },
                { passive: true }
            );
            window.addEventListener("load", resetAfterReload, { passive: true });
        })();
    </script>

    <style>
        :root {
            --primary: #0071e3;
            --ink: #1d1d1f;

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .nav-menu-toggle {
            display: none; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0;
            border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.92); color: var(--ink);
            cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
        }
        .nav-menu-toggle:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .nav-menu-bars { display: flex; flex-direction: column; gap: 5px; width: 18px; }
        .nav-menu-bars span { display: block; height: 2px; background: var(--ink); border-radius: 1px; transition: transform 0.25s ease, opacity 0.2s ease; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        nav.nav-menu-open .nav-menu-bars span:nth-child(2) { opacity: 0; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

            display: none; position: fixed; inset: 0; z-index: 0; margin: 0; padding: 0; border: none;

        @media (min-width: 1025px) { #nav-backdrop { display: none !important; } }
        .logo { text-decoration: none; display: flex; align-items: center; gap: 0; }
        .logo-icon { width: 74px; height: 74px; }

        .lang-switcher:focus-visible {
            outline: 2px solid var(--primary);

        }

            border: 1px solid var(--line);
            background: rgba(255,255,255,.9);
            color: var(--ink);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;

            .content { padding: 128px 20px 60px; }

        }

                    s1: "1. Verantwortlicher",
                    s1c: "Verantwortlich für die Datenverarbeitung ist:\n\nApzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app",
                    s2: "2. Datenerhebung und -speicherung",
                    s2c: "Fishfy erhebt und speichert folgende Daten:\n\n• Standortdaten (je nach Ihrer Freigabe in den iOS-Einstellungen)\n• Fotos von Fängen (lokal auf dem Gerät)\n• Angelspots und Notizen (lokal auf dem Gerät)\n• Wetterdaten (über Open-Meteo)\n• Fangdaten mit Wetterbedingungen (lokal auf dem Gerät)\n\nAlle Daten werden ausschließlich lokal auf Ihrem Gerät gespeichert. Es erfolgt keine Übertragung an externe Server, außer:\n• Open-Meteo für Wetterdaten\n• Push-Benachrichtigungen (Pro): Zur Zustellung von Benachrichtigungen (Aktivität, Ähnliche Fänge) werden Ihr Geräte-Token und Ihre Einstellungen (z.B. ausgewählte Spots) an Firebase (Google) übermittelt. Für diese Funktion erforderliche Fang-/Spotdaten werden auf Firebase-Infrastruktur verarbeitet.\n• Cloud-Synchronisation (Pro, optional): Bei Anmeldung mit einem Konto können Fänge und Spots zwischen Geräten synchronisiert werden; dabei werden sie auf Servern von Firebase (Google) verarbeitet und gespeichert.\n• Import alter Fänge (Pro, optional): Bei Nutzung der Funktion 'Alte Fänge' werden ausgewählte Fotos aus Ihrer Mediathek, manuell eingegebene Fangzeit/-position und automatisch ergänzte historische Wetterdaten im Fangdatensatz gespeichert.\n• Fang-Transfer: Historisch importierte Fänge sind vom Transfer ausgeschlossen.\n• Optional: Freiwillige Datenweitergabe zur App-Verbesserung (siehe Abschnitt 7). Wenn aktiviert, werden Fangdaten (z.B. Datum/Uhrzeit, Fischart, Größe, Ortsname, Koordinaten, Notizen), zugehörige Wetter-/Bedingungsdaten und ggf. Fangfotos an den Fishfy-Übermittlungsdienst gesendet und über technische Dienstleister (Server-/E-Mail-Infrastruktur) an uns übermittelt.",
                    s3: "3. Standortdaten",

                    s5: "5. Wetterdaten",
                    s5c: "Die App nutzt Open-Meteo, um Wetterdaten abzurufen. Open-Meteo ist ein offener Wetterdienst (open-meteo.com).\n\nFür die automatische Pegel-Einschätzung werden Spot-Koordinaten (Breite/Länge) und ggf. der Länder-Code an den Fishfy-Backenddienst übermittelt. Dieser fragt je nach Land verfügbare Pegelquellen ab und liefert passende Pegelstationen mit aktuellen Werten in cm an die App zurück. Derzeit angebundene Quellen sind u.a. PEGELONLINE (Deutschland), Rijkswaterstaat WaterWebservices (Niederlande), eHYD (Österreich), BAFU-Hydrodaten (Schweiz), HUBEAU (Frankreich), WATERINFO/HIC (Belgien, Flandern), Hydrométrie Wallonie KiWIS (Belgien, Wallonie), BRUWATER Open Data (Belgien, Brüssel) sowie Héichwaasser (Luxemburg).\n\nWetterdaten und Pegelabfragen dienen ausschließlich der Funktionsbereitstellung in der App und werden nicht zur Profilerstellung verwendet.",
                    s6: "6. Datenexport",

                    s7: "7. Freiwillige Datenweitergabe",
                    s7c: "Sie können optional zustimmen, dass Fangdaten zur Verbesserung der App an uns übermittelt werden. Diese Funktion wird beim ersten Start der App standardmäßig aktiviert angeboten und kann jederzeit in den Einstellungen deaktiviert werden.\n\nWenn die Funktion aktiviert ist, können Fangdaten (z.B. Datum/Uhrzeit, Fischart, Größe, Ortsname, Koordinaten, Notizen), zugehörige Wetter-/Bedingungsdaten und ggf. Fangfotos übertragen werden. Die Übermittlung erfolgt über unseren technischen Übermittlungsdienst und dessen Infrastrukturanbieter.\n\nDiese Daten können personenbezogen sein (insbesondere durch Standortbezug oder Bildinhalte) und werden zur Analyse und Verbesserung der App verarbeitet.\n\nAnalysen dieser Daten erfolgen ausschließlich intern bei uns. Eine Weitergabe dieser Analyseergebnisse an unabhängige Dritte zu eigenen Zwecken erfolgt nicht. Für die technische Bereitstellung können Auftragsverarbeiter (z.B. Firebase/Google) eingesetzt werden.\n\nFangbilder ohne erkennbare Personen oder Gesichter (nur Fisch und Hintergrund) können außerdem für unsere Social-Media-Kanäle und zur Bewerbung der App verwendet werden. Bilder mit erkennbaren Personen werden nicht genutzt. Ebenso werden keine genauen oder erkennbaren Standortdaten aus Bildern für Werbezwecke verwendet; falls ein Standort erkennbar ist (z.B. markante Orte, Schilder, Kennzeichen, Hausnummern), wird dieser vor Verwendung unkenntlich gemacht bzw. verpixelt.\n\nSie können diese Einwilligung jederzeit widerrufen, indem Sie die Funktion in den Einstellungen deaktivieren. Der Widerruf gilt für die Zukunft und stoppt weitere Übermittlungen.",
                    s8: "8. Ihre Rechte (DSGVO/GDPR)",
                    s8c: "Sie haben das Recht:\n• Auskunft über Ihre gespeicherten Daten zu erhalten (Art. 15 DSGVO)\n• Berichtigung unrichtiger Daten (Art. 16 DSGVO)\n• Löschung Ihrer Daten (Art. 17 DSGVO), über die App-Funktion \"Alle Daten löschen\"\n• Einschränkung der Verarbeitung (Art. 18 DSGVO)\n• Widerspruch gegen die Verarbeitung (Art. 21 DSGVO)\n• Datenübertragbarkeit (Art. 20 DSGVO)\n• Widerruf Ihrer Einwilligung zur Datenweitergabe (jederzeit in den Einstellungen)\n• Beschwerde bei einer Aufsichtsbehörde (Art. 77 DSGVO)\n\nHinweis: Die App-Funktion \"Alle Daten löschen\" entfernt lokale Daten sowie, falls genutzt, Cloud-Daten in Ihrem Fishfy/Firebase-Konto. Bereits im Rahmen der freiwilligen Datenweitergabe (Abschnitt 7) an den Übermittlungsdienst übermittelte Daten können dadurch nicht automatisch aus externen Systemen entfernt werden; dafür kontaktieren Sie bitte support@fishfy.app.\n\nBei Deinstallation der App werden alle lokal gespeicherten Daten gelöscht.",
                    s9: "9. Kontakt",
                    s9c: "Bei Fragen zum Datenschutz kontaktieren Sie uns bitte unter:\n\nsupport@fishfy.app",
                    s10: "10. Spot belegt (Pro-Funktion)",
                    s10c: "Wenn Sie die Pro-Funktion „Spot belegt“ aktivieren, verarbeitet die App Standortdaten, um Ihre Anwesenheit an einem Spot im Umkreis von 100 m zu bestimmen. Die Anzeige erfolgt als Belegt-Status mit Zähler und ist nur für Pro-Nutzer sichtbar.\n\nDie Verarbeitung erfolgt nur, wenn Sie die Funktion aktiv einschalten und die erforderlichen Berechtigungen erteilen. Bei Standort „Beim Verwenden“ wird in Intervallen ein Check-in angefragt; ohne Bestätigung wird die Belegung automatisch beendet. Bei Standort „Immer“ wird der Standort in Intervallen geprüft; bei Standortverlust gelten zeitlich begrenzte Sicherungs- und Abschaltlogiken.\n\nBei komplett geschlossenem App-Prozess kann keine sofortige aktive Freigabe mehr ausgelöst werden. Der Status wird dann serverseitig zeitnah automatisch zurückgesetzt.\n\nZur technischen Bereitstellung werden Spot-bezogene Presence-Daten über abgesicherte Cloud-Funktionen verarbeitet. Direkter Client-Zugriff auf die zugrunde liegenden Presence-Sammlungen ist ausgeschlossen. Wir verwenden dabei Schutzmaßnahmen gegen Missbrauch (u.a. Authentifizierung, serverseitige Prüfungen und zeitlich begrenzte Sessions).",

                    s1: "1. Controller",

                    s2: "2. Data collection and storage",
                    s2c: "Fishfy collects and stores the following data:\n\n• Location data (depending on your permission in iOS settings)\n• Photos of catches (stored locally on the device)\n• Fishing spots and notes (stored locally on the device)\n• Weather data (via Open-Meteo)\n• Catch data with weather conditions (stored locally on the device)\n\nAll data is stored exclusively on your device. No data is transferred to external servers, except:\n• Open-Meteo for weather data\n• Push notifications (Pro): To deliver notifications (activity, similar catches), your device token and settings (e.g. selected spots) are sent to Firebase (Google). Catch/spot data required for this function are processed on Firebase infrastructure.\n• Cloud sync (Pro, optional): When signed in, catches and spots can be synced between devices; they are processed and stored on Firebase (Google) servers.\n• Old catch import (Pro, optional): When using 'Old catches', selected photos from your library, manually entered catch time/location, and automatically enriched historical weather data are stored in the catch record.\n• Catch transfer: Historically imported catches are excluded from transfer.\n• Optional: Voluntary data sharing for app improvement (see section 7). When enabled, catch data (e.g. date/time, fish species, size, location name, coordinates, notes), related weather/condition data, and where applicable catch photos are sent to the Fishfy transfer service and transmitted to us via technical service providers (server/email infrastructure).",
                    s3: "3. Location data",
                    s3c: "The app uses location data to:\n• Retrieve weather data for your current location\n• Mark fishing spots\n• Record catch locations\n\nYou decide when the app may access your location. In iOS settings you can choose: \"Never\", \"Ask Next Time or When I Share\", \"While Using the App\" or \"Always\". The app uses location only for these purposes; there is no continuous background tracking. Location references in catches and spots you save are stored locally on your device. You can change or revoke access at any time in iOS settings.",

                    s4c: "The app needs camera access to photograph catches. Photos are stored locally on your device by default.\n\nOptionally, the app may request access to the photo library to save catch photos to your gallery. The photos remain on your device.\n\nIf you enable voluntary data sharing (see section 7), catch photos may be sent together with catch data to our transfer service.",
                    s5: "5. Weather data",
                    s5c: "The app uses Open-Meteo to retrieve weather data. Open-Meteo is an open weather service (open-meteo.com).\n\nFor automatic water-level estimation, spot coordinates (latitude/longitude) and, if available, the country code are sent to the Fishfy backend service. Depending on the country, this service queries available gauge sources and returns matching stations with current values in cm to the app. Currently integrated sources include PEGELONLINE (Germany), Rijkswaterstaat WaterWebservices (Netherlands), eHYD (Austria), FOEN/BAFU hydrology data (Switzerland), HUBEAU (France), WATERINFO/HIC (Belgium, Flanders), Hydrométrie Wallonie KiWIS (Belgium, Wallonia), BRUWATER Open Data (Belgium, Brussels), and Héichwaasser (Luxembourg).\n\nWeather and water-level requests are used only to provide app functionality and are not used for profiling.",
                    s6: "6. Data export",
                    s6c: "You can export your catches as PDF at any time. Export is performed locally on your device.",
                    s7: "7. Voluntary data sharing",
                    s7c: "You can optionally agree that catch data is sent to us to improve the app. This feature is offered as enabled by default on first launch and can be disabled at any time in settings.\n\nWhen enabled, catch data (e.g. date/time, fish species, size, location name, coordinates, notes), related weather/condition data, and where applicable catch photos may be transmitted. The transfer is handled via our technical transfer service and its infrastructure providers.\n\nThese data may be personal data (especially through location reference or image content) and are processed for analysis and app improvement.\n\nAnalyses of these data are carried out exclusively internally by us. These analysis results are not shared with independent third parties for their own purposes. For technical provision, processors (e.g. Firebase/Google) may be used.\n\nCatch photos where no persons or faces are visible (fish and background only) may also be used for our social media channels and to promote the app. Photos showing identifiable persons are not used. Likewise, no exact or otherwise identifiable location details from images are used for advertising; if a location is recognizable (e.g. landmarks, signs, license plates, house numbers), it is obscured or pixelated before use.\n\nYou can revoke this consent at any time by disabling the feature in settings. Revoking consent applies to future processing and stops further transfers.",
                    s8: "8. Your rights (GDPR)",
                    s8c: "You have the right to:\n• Obtain information about your stored data (Art. 15 GDPR)\n• Rectification of inaccurate data (Art. 16 GDPR)\n• Erasure of your data (Art. 17 GDPR), via the app function \"Delete all data\"\n• Restriction of processing (Art. 18 GDPR)\n• Object to processing (Art. 21 GDPR)\n• Data portability (Art. 20 GDPR)\n• Withdraw your consent to data sharing (at any time in settings)\n• Lodge a complaint with a supervisory authority (Art. 77 GDPR)\n\nNote: The app function \"Delete all data\" removes local data and, if used, cloud data in your Fishfy/Firebase account. Data that has already been transmitted to the transfer service as part of voluntary data sharing (section 7) cannot be automatically removed from external systems by this function; for this, please contact support@fishfy.app.\n\nWhen you uninstall the app, all locally stored data is deleted.",
                    s9: "9. Contact",
                    s9c: "For questions about privacy, please contact us at:\n\nsupport@fishfy.app",
                    s10: "10. Spot Occupied (Pro feature)",
                    s10c: "If you enable the Pro feature \"Spot Occupied\", the app processes location data to determine your presence within a 100 m radius around a spot. The result is shown as an occupied status with count and is visible to Pro users only.\n\nProcessing only takes place when you actively enable the feature and grant the required permissions. With \"While Using\", check-ins are requested at intervals; without confirmation, occupancy is ended automatically. With \"Always\", location is checked at intervals; if location is lost, time-limited fallback and shutdown logic applies.\n\nIf the app process is fully closed, an immediate active release can no longer be triggered. In that case, status is reset automatically on the server shortly after.\n\nFor technical delivery, spot-related presence data is processed via secured cloud functions. Direct client access to underlying presence collections is blocked. We apply anti-abuse safeguards (including authentication, server-side validation, and time-limited sessions).",
                    footerCopy: "© 2026 Apzura. All rights reserved."
                },
                nl: {
                    pageTitle: "Privacybeleid",
                    updated: "Stand: 3 april 2026",
                    nav_features: "Functies",
                    nav_about: "Over ons",
                    nav_privacy: "Privacy",
                    nav_imprint: "Colofon",
                    home: "Startpagina",
                    privacy: "Privacy",
                    imprint: "Colofon",
                    terms: "Gebruiksvoorwaarden",
                    nav_aria_menu: "Menu openen",
                    nav_aria_close: "Menu sluiten",
                    nav_aria_backdrop: "Menu sluiten",
                    s1: "1. Verantwoordelijke",
                    s1c: "Verantwoordelijk voor de gegevensverwerking:\n\nApzura\nHafenstraße 39, 67346 Speyer\nE-mail: support@fishfy.app",
                    s2: "2. Gegevensverzameling en -opslag",
                    s2c: "Fishfy verzamelt en slaat de volgende gegevens op:\n\n• Locatiegegevens (afhankelijk van je toestemming in de iOS-instellingen)\n• Foto's van vangsten (lokaal op het apparaat opgeslagen)\n• Visstekken en notities (lokaal op het apparaat opgeslagen)\n• Weergegevens (via Open-Meteo)\n• Vangstgegevens met weersomstandigheden (lokaal op het apparaat opgeslagen)\n\nAlle gegevens worden uitsluitend op je apparaat opgeslagen. Er worden geen gegevens naar externe servers gestuurd, behalve:\n• Open-Meteo voor weergegevens\n• Pushmeldingen (Pro): Om meldingen te versturen (activiteit, vergelijkbare vangsten) worden je apparaat-token en instellingen (bijv. gekozen plekken) naar Firebase (Google) gestuurd. Voor deze functie benodigde vangst-/plekgegevens worden verwerkt op Firebase-infrastructuur.\n• Cloudsync (Pro, optioneel): Bij inloggen kunnen vangsten en plekken tussen apparaten gesynchroniseerd worden; ze worden verwerkt en opgeslagen op Firebase (Google)-servers.\n• Oude vangsten importeren (Pro, optioneel): Bij gebruik van 'Oude vangsten' worden geselecteerde foto's uit je fotobibliotheek, handmatig ingevoerde vangsttijd/-locatie en automatisch aangevulde historische weerdata in de vangst opgeslagen.\n• Vangstoverdracht: Historisch geïmporteerde vangsten zijn uitgesloten van overdracht.\n• Optioneel: Vrijwillige gegevensdeling voor verbetering van de app (zie sectie 7). Als deze functie is ingeschakeld, worden vangstgegevens (bijv. datum/tijd, vissoort, grootte, locatienaam, coördinaten, notities), bijbehorende weer-/conditiegegevens en eventueel vangstfoto's naar de Fishfy-overdrachtsdienst gestuurd en via technische dienstverleners (server-/e-mailinfrastructuur) aan ons doorgegeven.",
                    s3: "3. Locatiegegevens",
                    s3c: "De app gebruikt locatiegegevens om:\n• Weergegevens voor je huidige locatie op te halen\n• Visstekken te markeren\n• Vangstlocaties vast te leggen\n\nJij bepaalt wanneer de app toegang tot je locatie mag hebben. In de iOS-instellingen kun je kiezen: \"Nooit\", \"Volgende keer of bij delen vragen\", \"Bij gebruik van de app\" of \"Altijd\". De app gebruikt locatie alleen voor deze doeleinden; er is geen continue achtergrondtracking. Locatiegegevens in door jou opgeslagen vangsten en stekken worden lokaal op je apparaat opgeslagen. Je kunt de toestemming altijd wijzigen of intrekken in de iOS-instellingen.",
                    s4: "4. Camera en fotobibliotheek",
                    s4c: "De app heeft cameratoegang nodig om vangsten te fotograferen. Foto's worden standaard lokaal op je apparaat opgeslagen.\n\nOptioneel kan de app toegang tot de fotobibliotheek vragen om vangstfoto's in je galerij op te slaan. De foto's blijven op je apparaat.\n\nAls je vrijwillige gegevensdeling inschakelt (zie sectie 7), kunnen vangstfoto's samen met vangstgegevens naar onze overdrachtsdienst worden gestuurd.",
                    s5: "5. Weergegevens",
                    s5c: "De app gebruikt Open-Meteo om weergegevens op te halen. Open-Meteo is een open weerdienst (open-meteo.com).\n\nVoor de automatische peilschatting worden spotcoördinaten (breedte-/lengtegraad) en, indien beschikbaar, de landcode naar de Fishfy-backendservice gestuurd. Deze service vraagt per land beschikbare peilbronnen op en stuurt passende peilstations met actuele waarden in cm terug naar de app. Momenteel gekoppelde bronnen zijn o.a. PEGELONLINE (Duitsland), Rijkswaterstaat WaterWebservices (Nederland), eHYD (Oostenrijk), BAFU-hydrologiedata (Zwitserland), HUBEAU (Frankrijk), WATERINFO/HIC (België, Vlaanderen), Hydrométrie Wallonie KiWIS (België, Wallonië), BRUWATER Open Data (België, Brussel) en Héichwaasser (Luxemburg).\n\nWeer- en peilaanvragen worden uitsluitend gebruikt om appfuncties te leveren en niet voor profilering.",
                    s6: "6. Gegevensexport",
                    s6c: "Je kunt je vangsten op elk moment als PDF exporteren. De export wordt lokaal op je apparaat uitgevoerd.",
                    s7: "7. Vrijwillige gegevensdeling",
                    s7c: "Je kunt optioneel toestemmen dat vangstgegevens naar ons worden gestuurd om de app te verbeteren. Deze functie staat standaard aan bij de eerste start en kan op elk moment in de instellingen worden uitgeschakeld.\n\nAls de functie is ingeschakeld, kunnen vangstgegevens (bijv. datum/tijd, vissoort, grootte, locatienaam, coördinaten, notities), bijbehorende weer-/conditiegegevens en eventueel vangstfoto's worden doorgestuurd. De overdracht verloopt via onze technische overdrachtsdienst en diens infrastructuurproviders.\n\nDeze gegevens kunnen persoonsgegevens bevatten (met name door locatiegegevens of beeldinhoud) en worden verwerkt voor analyse en verbetering van de app.\n\nAnalyses van deze gegevens worden uitsluitend intern bij ons uitgevoerd. Deze analyseresultaten worden niet gedeeld met onafhankelijke derden voor hun eigen doeleinden. Voor de technische levering kunnen verwerkers (bijv. Firebase/Google) worden ingezet.\n\nVangstfoto's waarop geen personen of gezichten zichtbaar zijn (alleen vis en achtergrond) kunnen daarnaast worden gebruikt voor onze socialmedia-kanalen en om de app te promoten. Foto's met herkenbare personen worden niet gebruikt. Ook worden geen exacte of anderszins herkenbare locatiegegevens uit beelden gebruikt voor reclame; als een locatie herkenbaar is (bijv. markante plekken, borden, kentekens, huisnummers), wordt die vóór gebruik onherkenbaar gemaakt of gepixeld.\n\nJe kunt deze toestemming op elk moment intrekken door de functie in de instellingen uit te schakelen. Het intrekken van toestemming geldt voor de toekomst en stopt verdere doorgifte.",
                    s8: "8. Uw rechten (AVG)",
                    s8c: "Je hebt het recht op:\n• Inzage in je opgeslagen gegevens (art. 15 AVG)\n• Correctie van onjuiste gegevens (art. 16 AVG)\n• Wissing van je gegevens (art. 17 AVG), via de appfunctie \"Alle gegevens verwijderen\"\n• Beperking van verwerking (art. 18 AVG)\n• Bezwaar tegen verwerking (art. 21 AVG)\n• Gegevensoverdraagbaarheid (art. 20 AVG)\n• Intrekking van je toestemming voor gegevensdeling (op elk moment in de instellingen)\n• Klacht indienen bij een toezichthoudende autoriteit (art. 77 AVG)\n\nLet op: de appfunctie \"Alle gegevens verwijderen\" verwijdert lokale gegevens en, indien gebruikt, cloudgegevens in je Fishfy/Firebase-account. Gegevens die al naar de overdrachtsdienst zijn verstuurd in het kader van vrijwillige gegevensdeling (sectie 7), kunnen hiermee niet automatisch uit externe systemen worden verwijderd; neem daarvoor contact op via support@fishfy.app.\n\nBij het verwijderen van de app worden alle lokaal opgeslagen gegevens gewist.",
                    s9: "9. Contact",
                    s9c: "Voor vragen over privacy kun je contact met ons opnemen via:\n\nsupport@fishfy.app",
                    s10: "10. Spot bezet (Pro-functie)",
                    s10c: "Als je de Pro-functie \"Spot bezet\" activeert, verwerkt de app locatiegegevens om je aanwezigheid binnen een straal van 100 m rond een spot te bepalen. De weergave gebeurt als bezet-status met teller en is alleen zichtbaar voor Pro-gebruikers.\n\nVerwerking vindt alleen plaats wanneer je de functie actief inschakelt en de vereiste toestemmingen geeft. Bij \"Bij gebruik\" worden check-ins met intervallen gevraagd; zonder bevestiging wordt de bezetting automatisch beëindigd. Bij \"Altijd\" wordt de locatie met intervallen gecontroleerd; bij locatieverlies gelden tijdelijke fallback- en uitschakellogica.\n\nAls het app-proces volledig is afgesloten, kan geen directe actieve vrijgave meer worden uitgevoerd. In dat geval wordt de status kort daarna automatisch server-side gereset.\n\nVoor de technische werking worden spot-gerelateerde presence-gegevens verwerkt via beveiligde cloudfuncties. Directe clienttoegang tot de onderliggende presence-collecties is geblokkeerd. We gebruiken anti-misbruikmaatregelen (onder andere authenticatie, server-side controles en tijdsgebonden sessies).",
                    footerCopy: "© 2026 Apzura. Alle rechten voorbehouden."
                },
                fr: {
                    pageTitle: "Politique de confidentialité",
                    updated: "État : 3 avril 2026",

                    nav_imprint: "Mentions légales",
                    home: "Accueil",
                    privacy: "Confidentialité",
                    imprint: "Mentions légales",
                    terms: "Conditions",
                    nav_aria_menu: "Ouvrir le menu",
                    nav_aria_close: "Fermer le menu",
                    nav_aria_backdrop: "Fermer le menu",
                    s1: "1. Responsable",
                    s1c: "Responsable du traitement des données :\n\nApzura\nHafenstraße 39, 67346 Speyer\nE-mail : support@fishfy.app",
                    s2: "2. Collecte et stockage des données",
                    s2c: "Fishfy collecte et stocke les données suivantes :\n\n• Données de localisation (selon votre autorisation dans les réglages iOS)\n• Photos de prises (stockées localement sur l'appareil)\n• Spots de pêche et notes (stockés localement sur l'appareil)\n• Données météo (via Open-Meteo)\n• Données de prises avec conditions météo (stockées localement sur l'appareil)\n\nToutes les données sont stockées exclusivement sur votre appareil. Aucune donnée n'est transmise à des serveurs externes, sauf :\n• Open-Meteo pour les données météo\n• Notifications push (Pro) : pour envoyer des notifications (activité, prises similaires), votre jeton d'appareil et vos réglages (p. ex. spots sélectionnés) sont envoyés à Firebase (Google). Les données de prises/spots nécessaires à cette fonction sont traitées sur l'infrastructure Firebase.\n• Synchronisation cloud (Pro, optionnel) : lorsque vous êtes connecté, les prises et spots peuvent être synchronisés entre appareils ; ils sont traités et stockés sur les serveurs Firebase (Google).\n• Import d'anciennes prises (Pro, optionnel) : en utilisant 'Anciennes prises', des photos sélectionnées de votre photothèque, l'heure/la position saisies manuellement et des données météo historiques enrichies automatiquement sont enregistrées dans la prise.\n• Transfert de prise : les prises importées historiquement sont exclues du transfert.\n• Optionnel : partage volontaire de données pour améliorer l'app (voir section 7). Si activé, des données de prise (p. ex. date/heure, espèce, taille, nom du lieu, coordonnées, notes), des données météo/conditions associées et, le cas échéant, des photos de prise sont envoyées au service de transfert Fishfy et nous sont transmises via des prestataires techniques (infrastructure serveur/e-mail).",
                    s3: "3. Données de localisation",
                    s3c: "L'app utilise les données de localisation pour :\n• Récupérer les données météo pour votre position actuelle\n• Marquer les spots de pêche\n• Enregistrer les lieux de prise\n\nVous décidez quand l'app peut accéder à votre position. Dans les réglages iOS vous pouvez choisir : « Jamais », « Demander la prochaine fois ou quand je partage », « Lors de l'utilisation de l'app » ou « Toujours ». L'app utilise la localisation uniquement pour ces finalités ; il n'y a pas de suivi continu en arrière-plan. Les informations de localisation des prises et spots que vous enregistrez sont stockées localement sur votre appareil. Vous pouvez modifier ou révoquer l'accès à tout moment dans les réglages iOS.",
                    s4: "4. Appareil photo et photothèque",
                    s4c: "L'app a besoin de l'accès à la caméra pour photographier les prises. Les photos sont stockées localement sur votre appareil par défaut.\n\nOptionnellement, l'app peut demander l'accès à la photothèque pour enregistrer les photos de prises dans votre galerie. Les photos restent sur votre appareil.\n\nSi vous activez le partage volontaire de données (voir section 7), des photos de prise peuvent être envoyées avec les données de prise à notre service de transfert.",
                    s5: "5. Données météo",
                    s5c: "L'app utilise Open-Meteo pour récupérer les données météo. Open-Meteo est un service météo ouvert (open-meteo.com).\n\nPour l'estimation automatique du niveau d'eau, les coordonnées du spot (latitude/longitude) et, si disponible, le code pays sont transmises au service backend Fishfy. Ce service interroge, selon le pays, les sources de niveau disponibles et renvoie à l'app les stations correspondantes avec les valeurs actuelles en cm. Les sources actuellement intégrées incluent notamment PEGELONLINE (Allemagne), Rijkswaterstaat WaterWebservices (Pays-Bas), eHYD (Autriche), données hydrologiques OFEV/BAFU (Suisse), HUBEAU (France), WATERINFO/HIC (Belgique, Flandre), Hydrométrie Wallonie KiWIS (Belgique, Wallonie), BRUWATER Open Data (Belgique, Bruxelles) et Héichwaasser (Luxembourg).\n\nLes requêtes météo et de niveau d'eau servent uniquement à fournir les fonctionnalités de l'app et ne sont pas utilisées pour le profilage.",
                    s6: "6. Export des données",
                    s6c: "Vous pouvez exporter vos prises en PDF à tout moment. L'export est effectué localement sur votre appareil.",
                    s7: "7. Partage volontaire de données",
                    s7c: "Vous pouvez accepter de manière optionnelle que des données de prises nous soient transmises pour améliorer l'app. Cette fonction est proposée activée par défaut au premier lancement et peut être désactivée à tout moment dans les réglages.\n\nLorsque la fonction est activée, des données de prise (p. ex. date/heure, espèce, taille, nom du lieu, coordonnées, notes), des données météo/conditions associées et, le cas échéant, des photos de prise peuvent être transmises. Le transfert s'effectue via notre service technique de transfert et ses prestataires d'infrastructure.\n\nCes données peuvent constituer des données personnelles (notamment via la localisation ou le contenu des images) et sont traitées pour l'analyse et l'amélioration de l'app.\n\nLes analyses de ces données sont réalisées exclusivement en interne chez nous. Ces résultats d'analyse ne sont pas partagés avec des tiers indépendants à leurs propres fins. Des sous-traitants techniques (p. ex. Firebase/Google) peuvent être utilisés pour la fourniture technique.\n\nLes photos de prises sur lesquelles aucune personne ni visage n'est reconnaissable (poisson et arrière-plan uniquement) peuvent aussi être utilisées pour nos réseaux sociaux et la promotion de l'app. Les photos montrant des personnes identifiables ne sont pas utilisées. De même, aucune donnée de localisation exacte ou autrement identifiable issue des images n'est utilisée à des fins publicitaires ; si un lieu est reconnaissable (p. ex. lieux marquants, panneaux, plaques d'immatriculation, numéros de maison), il est anonymisé ou pixellisé avant utilisation.\n\nVous pouvez révoquer ce consentement à tout moment en désactivant la fonction dans les réglages. Le retrait du consentement s'applique pour l'avenir et arrête les transmissions futures.",
                    s8: "8. Vos droits (RGPD)",
                    s8c: "Vous avez le droit :\n• D'obtenir des informations sur vos données stockées (art. 15 RGPD)\n• À la rectification des données inexactes (art. 16 RGPD)\n• À l'effacement de vos données (art. 17 RGPD), via la fonction de l'app « Supprimer toutes les données »\n• À la limitation du traitement (art. 18 RGPD)\n• De vous opposer au traitement (art. 21 RGPD)\n• À la portabilité des données (art. 20 RGPD)\n• De retirer votre consentement au partage de données (à tout moment dans les réglages)\n• De déposer une plainte auprès d'une autorité de contrôle (art. 77 RGPD)\n\nRemarque : la fonction de l'app « Supprimer toutes les données » supprime les données locales ainsi que, le cas échéant, les données cloud de votre compte Fishfy/Firebase. Les données déjà transmises au service de transfert dans le cadre du partage volontaire (section 7) ne peuvent pas être supprimées automatiquement des systèmes externes par cette fonction ; pour cela, veuillez contacter support@fishfy.app.\n\nLorsque vous désinstallez l'app, toutes les données stockées localement sont supprimées.",
                    s9: "9. Contact",
                    s9c: "Pour toute question relative à la confidentialité, contactez-nous à :\n\nsupport@fishfy.app",
                    s10: "10. Spot occupé (fonction Pro)",
                    s10c: "Si vous activez la fonction Pro « Spot occupé », l'app traite des données de localisation pour déterminer votre présence dans un rayon de 100 m autour d'un spot. Le résultat est affiché comme statut d'occupation avec compteur et n'est visible que pour les utilisateurs Pro.\n\nLe traitement n'a lieu que si vous activez la fonction volontairement et accordez les autorisations nécessaires. Avec « Pendant l'utilisation », des check-ins sont demandés à intervalles ; sans confirmation, l'occupation est arrêtée automatiquement. Avec « Toujours », la localisation est vérifiée à intervalles ; en cas de perte de localisation, des logiques temporisées de secours et d'arrêt s'appliquent.\n\nSi le processus de l'app est complètement fermé, une libération active immédiate ne peut plus être déclenchée. Dans ce cas, le statut est réinitialisé automatiquement côté serveur peu après.\n\nPour la fourniture technique, les données de présence liées aux spots sont traitées via des fonctions cloud sécurisées. L'accès direct du client aux collections de présence sous-jacentes est bloqué. Nous appliquons des mesures anti-abus (authentification, validations côté serveur et sessions à durée limitée).",
                    footerCopy: "© 2026 Apzura. Tous droits réservés."
                },
                lb: {

                    nav_aria_backdrop: "Menu zoumaachen",
                    s1: "1. Verantwortlechen",
                    s1c: "Verantwortlech fir d'Donnéeëveraarbechtung ass:\n\nApzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app",
                    s2: "2. Donnéeënerhiewung an -späicherung",
                    s2c: "Fishfy erheeft a späichert folgend Donnéeën:\n\n• Standuertdaten (je no Ärer Fräigab an den iOS-Astellungen)\n• Fotoen vu Fäng (lokal um Apparat)\n• Angelspots a Notizen (lokal um Apparat)\n• Wiederdaten (iwwer Open-Meteo)\n• Fangdaten mat Wiederbedingungen (lokal um Apparat)\n\nAll Donnéeë ginn exklusiv lokal um Ärem Apparat gespäichert. Et kënnt keng Iwwerdroung un extern Server, ausser:\n• Open-Meteo fir Wiederdaten\n• Push-Notifikatiounen (Pro): Fir d'Liwwerung vun Notifikatiounen (Aktivitéit, Ähnlech Fäng) ginn Är Apparat-Token an Är Astellungen (z.B. ausgewielte Spots) un Firebase (Google) iwwermëttelt. Fang-/Spotdaten, déi fir dës Funktioun néideg sinn, ginn op Firebase-Infrastruktur veraarbecht.\n• Cloud-Synchronisatioun (Pro, optional): Bei Umellung mat engem Kont kënne Fäng a Spots tëschent Apparater synchroniséiert ginn; dobäi ginn se op Servere vu Firebase (Google) veraarbecht a gespäichert.\n• Import vun ale Fäng (Pro, optional): Bei der Funktioun 'Al Fäng' ginn ausgewielte Fotoen aus der Mediathek, manuell aginn Fangzäit/-positioun an automatesch ergänzt historesch Wiederdaten am Fangdatensatz gespäichert.\n• Fang-Transfer: Historesch importéiert Fäng si vum Transfer ausgeschloss.\n• Optional: Fräiwëlleg Donnéeëweidergab fir d'App ze verbesseren (kuck Abschnitt 7). Wann aktivéiert, ginn Fangdaten (z.B. Datum/Auerzäit, Fëschaart, Gréisst, Plaznumm, Koordinaten, Notizen), passend Wieder-/Bedingungsdaten an, falls do, Fangfotoen un de Fishfy-Transfertservice geschéckt a via technesch Déngschtleeschter (Server-/E-Mail-Infrastruktur) un eis iwwermëttelt.",
                    s3: "3. Standuertdaten",
                    s3c: "D'App benotzt Standuertdaten, fir:\n• Wiederdaten fir Ären aktuellen Standuert ofzeruffen\n• Angelspots ze markéieren\n• Fangpositiounen ze dokumentéieren\n\nDir entscheed selwer, wéini d'App op Ären Standuert zougräife darf. An den iOS-Astellungen kënnt dir wielen: „Ni“, „Nächst Kéier oder beim Deelen froen“, „Beim Benotze vun der App“ oder „Ëmmer“. D'App benotzt de Standuert nëmme fir déi genannte Zwecker; et gëtt keng dauerhaft Hannergrondverfolgung. Standuertbezunnen Donnéeën an de Fäng a Spots, déi dir späichert, ginn lokal op Ärem Apparat gespäichert. D'Fräigab kënnt dir jee Zäit an den iOS-Astellungen änneren oder entzéien.",
                    s4: "4. Kamera a Fotobibliothéik",
                    s4c: "D'App brauch Zougang op d'Kamera, fir Fäng ze fotograféieren. Fotoe ginn standardméisseg lokal um Ärem Apparat gespäichert.\n\nOptional kann d'App Zougang op d'Fotobibliothéik ufroen, fir Fangbiller an Är Galerie ze späicheren. D'Fotoe bleiwen um Ärem Apparat.\n\nWann Dir déi fräiwëlleg Donnéeëweidergab aktivéiert (kuck Abschnitt 7), kënnen Fangfotoe zesumme mat Fangdaten un eisen Transfertservice geschéckt ginn.",
                    s5: "5. Wiederdaten",
                    s5c: "D'App benotzt Open-Meteo, fir Wiederdaten ofzeruffen. Open-Meteo ass en oppene Wiederdéngscht (open-meteo.com).\n\nFir déi automatesch Pegel-Schätzung ginn d'Spot-Koordinaten (Breet/Längt) an, wa verfügbar, de Lännercode un de Fishfy-Backendservice iwwermëttelt. Dëse Service freet je no Land verfügbar Pegelquellen of a liwwert passend Pegelstatiounen mat aktuelle Wäerter a cm un d'App zeréck. Aktuell ugeschloss Quelle sinn u.a. PEGELONLINE (Däitschland), Rijkswaterstaat WaterWebservices (Holland), eHYD (Éisträich), BAFU-Hydrodonnéeën (Schwäiz), HUBEAU (Frankräich), WATERINFO/HIC (Belsch, Flandern), Hydrométrie Wallonie KiWIS (Belsch, Wallounien), BRUWATER Open Data (Belsch, Bréissel) an Héichwaasser (Lëtzebuerg).\n\nWieder- a Pegel-Ufroe gi just fir d'Funktioune vun der App benotzt a net fir Profilbildung.",
                    s6: "6. Donnéeënexport",
                    s6c: "Dir kënnt Är Fäng jee Zäit als PDF exportéieren. Den Export geschitt lokal um Ärem Apparat.",
                    s7: "7. Fräiwëlleg Donnéeëweidergab",
                    s7c: "Dir kënnt optional zoustëmmen, datt Fangdaten un eis iwwermëttelt ginn, fir d'App ze verbesseren. Dës Funktioun gëtt beim éischte Start vun der App standardméisseg aktivéiert ugebueden a kann jee Zäit an den Astellungen desaktivéiert ginn.\n\nWann d'Funktioun aktivéiert ass, kënnen Fangdaten (z.B. Datum/Auerzäit, Fëschaart, Gréisst, Plaznumm, Koordinaten, Notizen), passend Wieder-/Bedingungsdaten an, falls do, Fangfotoe iwwerdroe ginn. D'Iwwerdroung geschitt iwwer eisen techneschen Transfertservice a seng Infrastruktur-Déngschtleeschter.\n\nDës Donnéeë kënnen perséinlech Donnéeë sinn (besonnesch duerch Standuertbezug oder Bildinhalt) a ginn fir d'Analyse an d'Verbesserung vun der App veraarbecht.\n\nAnalyse vun dësen Donnéeë geschitt exklusiv intern bei eis. Dës Analyse-Resultater ginn net un onofhängeg Drëtter fir hir eege Zwecker weiderginn. Fir déi technesch Bereetstellung kënne Veraarbechter am Optrag (z.B. Firebase/Google) agesat ginn.\n\nFangfotoen, op deene keng Persounen oder Gesiichter ze gesi sinn (nëmme Fësch an Hannergrond), kënnen zousätzlech fir eis Social-Media-Kanäl an zur Bewerbung vun der App benotzt ginn. Fotoe mat erkennbare Persoune ginn net benotzt. Genee esou ginn keng exakt oder soss erkennbar Standuertdaten aus Biller fir Werbezwecker benotzt; wann e Standuert erkennbar ass (z.B. markant Plazen, Schëlter, Nummereschëlder, Hausnummeren), gëtt en virum Asaz onkenntlech gemaach bzw. verpixelt.\n\nDir kënnt dës Zoustëmmung jee Zäit widerrufen, andeems du d'Funktioun an den Astellungen desaktivéiers. De Widerruf gëllt fir d'Zukunft a stoppt weider Iwwerdroungen.",
                    s8: "8. Är Rechter (DSGVO/GDPR)",
                    s8c: "Dir hutt d'Recht:\n• Auskunft iwwer Är gespäichert Donnéeën ze kréien (Art. 15 DSGVO)\n• Berichtegung vun onrichtegen Donnéeën (Art. 16 DSGVO)\n• Läschung vun Ären Donnéeën (Art. 17 DSGVO), iwwer d'App-Fonktioun \"All Donnéeën läschen\"\n• Aschränkung vun der Veraarbechtung (Art. 18 DSGVO)\n• Widderspruch géint d'Veraarbechtung (Art. 21 DSGVO)\n• Donnéeëiwwerdrobarheet (Art. 20 DSGVO)\n• Widerruf vun Ärer Zoustëmmung zur Donnéeëweidergab (jee Zäit an den Astellungen)\n• Beschwer bei enger Iwwerwaachungsautoritéit (Art. 77 DSGVO)\n\nHinweis: D'App-Fonktioun \"All Donnéeën läschen\" läscht lokal Donnéeën an, wann benotzt, Cloud-Donnéeën an Ärem Fishfy/Firebase-Kont. Donnéeën, déi am Kader vun der fräiwëlleger Donnéeëweidergab (Abschnitt 7) schonn un den Transfertservice iwwermëttelt goufen, kënnen domat net automatesch aus externe Systemer geläscht ginn; dofir kontaktéiert w.e.g. support@fishfy.app.\n\nBei Desinstallatioun vun der App ginn all lokal gespäichert Donnéeë geläscht.",
                    s9: "9. Kontakt",
                    s9c: "Bei Froen zum Dateschutz kontaktéiert eis w.e.g. ënner:\n\nsupport@fishfy.app",
                    s10: "10. Spot besat (Pro-Funktioun)",
                    s10c: "Wann Dir d'Pro-Funktioun \"Spot besat\" aktivéiert, veraarbecht d'App Standuertdaten, fir Är Präsenz am Radius vun 100 m ronderëm e Spot ze bestëmmen. D'Unzeeche geschitt als Besat-Status mat Zuel a gëtt nëmme fir Pro-Benotzer gewisen.\n\nD'Veraarbechtung geschitt nëmmen, wann Dir d'Funktioun aktiv aschalt an déi néideg Erlaabnisser gitt. Bei \"Beim Benotzen\" ginn Check-ins an Intervaller ugefrot; ouni Confirmatioun gëtt d'Besatzung automatesch gestoppt. Bei \"Ëmmer\" gëtt de Standuert an Intervaller gepréift; bei Standuertverloscht gëllen zäitbegrenzte Backup- an Ausschaltlogiken.\n\nWann den App-Prozess komplett zou ass, kann keng direkt aktiv Fräigab méi ausgeléist ginn. An deem Fall gëtt de Status kuerz duerno automatesch serversäiteg zréckgesat.\n\nFir déi technesch Bereetstellung ginn spot-bezunnen Presence-Donnéeën iwwer ofgeséchert Cloud-Funktiounen veraarbecht. Direkte Client-Zougrëff op déi ënnerläit Presence-Sammlunge ass gespaart. Mir benotzen Anti-Mëssbrauchsmoossnamen (ënner anerem Authentifikatioun, serversäiteg Validatiounen a zäitlimitéiert Sessiounen).",
                    footerCopy: "© 2026 Apzura. All Rechter virbehalen."
                }
            };

            function normalizeLang(input) {
                if (!input) return FALLBACK;
                const value = input.toLowerCase();
                if (value.startsWith("lb") || value.startsWith("lu")) return "lb";
                const base = value.split("-")[0];
                return SUPPORTED.includes(base) ? base : FALLBACK;
            }

            function escapeHtml(text) {
                return text
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;");
            }

            function applyNavMenuLabels(lang) {
                const t = content[lang] || content[FALLBACK];
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (toggle && t.nav_aria_menu && t.nav_aria_close) {
                    toggle.setAttribute(
                        "aria-label",
                        window.__fishfyNavOpen ? t.nav_aria_close : t.nav_aria_menu
                    );
                }
                if (backdrop && t.nav_aria_backdrop) {
                    backdrop.setAttribute("aria-label", t.nav_aria_backdrop);
                    backdrop.setAttribute("aria-hidden", window.__fishfyNavOpen ? "false" : "true");
                }
            }

            function render(lang) {
                const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.privacy;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("updated").textContent = t.updated;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;

                applyNavMenuLabels(lang);

                sections.innerHTML = [
                    ["s1", "s1c", true],
                    ["s2", "s2c", false],
                    ["s3", "s3c", false],
                    ["s4", "s4c", false],
                    ["s5", "s5c", false],
                    ["s6", "s6c", false],
                    ["s7", "s7c", false],
                    ["s8", "s8c", false],
                    ["s9", "s9c", true],
                    ["s10", "s10c", false]
                ].map(([titleKey, contentKey, boxed]) => {
                    const block = '<h2>' + escapeHtml(t[titleKey]) + '</h2>';
                    const text = escapeHtml(t[contentKey]).replaceAll("\n", "<br>");
                    return block + (boxed ? '<div class="info-box">' + text + '</div>' : '<div class="section-text">' + text + '</div>');
                }).join("");
            }

            window.__fishfyNavOpen = false;

            function isNarrowNav() {
                return window.matchMedia("(max-width: 1024px)").matches;
            }

            function setNavMenuOpen(open) {
                const nav = document.getElementById("site-nav");
                const toggle = document.getElementById("nav-menu-toggle");
                if (!nav || !toggle) return;
                window.__fishfyNavOpen = !!open;
                nav.classList.toggle("nav-menu-open", window.__fishfyNavOpen);
                document.body.classList.toggle("nav-menu-open-body", window.__fishfyNavOpen);
                toggle.setAttribute("aria-expanded", window.__fishfyNavOpen ? "true" : "false");
                const lang = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
                applyNavMenuLabels(lang);
            }

            function closeNavMenu() {
                if (window.__fishfyNavOpen) setNavMenuOpen(false);
            }

            function toggleNavMenu() {
                if (!isNarrowNav()) return;
                setNavMenuOpen(!window.__fishfyNavOpen);
            }

            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => {
                const lang = normalizeLang(event.target.value);
                localStorage.setItem(storageKey, lang);
                render(lang);
            });

            (function initMobileNav() {
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (!toggle) return;
                toggle.addEventListener("click", function (e) {
                    e.stopPropagation();
                    toggleNavMenu();
                });
                if (backdrop) backdrop.addEventListener("click", closeNavMenu);
                const panel = document.getElementById("primary-nav");
                if (panel) {
                    panel.querySelectorAll("a").forEach(function (link) {
                        link.addEventListener("click", function () {
                            if (isNarrowNav()) closeNavMenu();
                        });
                    });
                }
                window.addEventListener("resize", function () {
                    if (!isNarrowNav()) closeNavMenu();
                }, { passive: true });
                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") closeNavMenu();
                });
            })();
        })();
    </script>
</body>
</html>
