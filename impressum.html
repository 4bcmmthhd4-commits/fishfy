    <style>
        :root {
            --primary: #0071e3;
            --ink: #1d1d1f;
            --ink-soft: #424245;
            --surface: #f5f5f7;
            --card: #ffffff;
            --line: #e5e5ea;
            --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height:1.7;
            color:var(--ink);
            background:var(--surface);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        nav {
            position:fixed;
            top:0;
            left:0;
            right:0;
            background:rgba(245,245,247,.72);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            z-index:1000;
            padding:14px 24px;
            border-bottom:1px solid rgba(0,0,0,.05);
            isolation:isolate;
        }
        .nav-container { position:relative; z-index:1; max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:16px; }
        .nav-end { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .nav-menu-toggle { display:none; align-items:center; justify-content:center; width:44px; height:44px; padding:0; border:1px solid var(--line); border-radius:12px; background:rgba(255,255,255,.92); color:var(--ink); cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
        .nav-menu-toggle:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
        .nav-menu-bars { display:flex; flex-direction:column; gap:5px; width:18px; }
        .nav-menu-bars span { display:block; height:2px; background:var(--ink); border-radius:1px; transition:transform .25s ease, opacity .2s ease; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
        nav.nav-menu-open .nav-menu-bars span:nth-child(2) { opacity:0; }
        nav.nav-menu-open .nav-menu-bars span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
        #nav-backdrop { display:none; position:fixed; inset:0; z-index:0; margin:0; padding:0; border:none; background:rgba(0,0,0,.28); cursor:pointer; opacity:0; transition:opacity .2s ease; -webkit-tap-highlight-color:transparent; }
        nav.nav-menu-open #nav-backdrop { display:block; opacity:1; }
        @media (min-width:769px){ #nav-backdrop { display:none !important; } }
        .logo { text-decoration:none; display:flex; align-items:center; gap:0; }
        .logo-icon { width:74px; height:74px; } .logo-icon img { display:block; width:100%; height:100%; object-fit:contain; }
        .nav-links { display:flex; gap:32px; list-style:none; }
        .nav-links a { color:var(--ink-soft); text-decoration:none; font-weight:500; font-size:15px; transition:color .2s; }
        .nav-links a.active { color: var(--primary); }
        .nav-links a:hover { color:var(--primary); }
        .nav-links a:focus-visible,
        .lang-switcher:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 10px;
        }
        .lang-switcher { border:1px solid var(--line); background:rgba(255,255,255,.9); color:var(--ink); border-radius:999px; padding:8px 14px; font-size:14px; font-weight:500; }
        .content { max-width:800px; margin:0 auto; padding:138px 24px 80px; }
        h1 { font-size:36px; font-weight:700; color:var(--ink); margin-bottom:48px; letter-spacing:-0.02em; }
        h2 { font-size:22px; font-weight:600; color:var(--ink); margin-top:48px; margin-bottom:16px; }
        .info-box { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:24px; margin:24px 0; color:var(--ink-soft); white-space:pre-line; }
        .section-text { color:var(--ink-soft); white-space:pre-line; margin-bottom:16px; }
        footer { background:#1d1d1f; color:rgba(255,255,255,.72); padding:40px 24px; text-align:center; }
        footer a { color:rgba(255,255,255,.7); text-decoration:none; margin:0 16px; } footer a:hover { color:white; }
        .footer-links { margin-bottom:24px; } .footer-copy { font-size:13px; opacity:.7; }
        @media (max-width:768px){
            .nav-menu-toggle { display:inline-flex; }
            .nav-container { flex-wrap:nowrap; align-items:center; }
            .logo { height:44px; align-items:center; }
            .logo-icon { width:44px; height:44px; flex-shrink:0; }
            .lang-switcher { height:44px; padding:0 12px; box-sizing:border-box; line-height:44px; }
            .nav-links { position:absolute; top:100%; left:-24px; right:-24px; width:calc(100% + 48px); margin:0; flex-direction:column; flex-wrap:nowrap; justify-content:flex-start; align-items:stretch; gap:0; padding:0; max-height:0; overflow:hidden; opacity:0; transition:max-height .32s ease, opacity .2s ease, padding .2s ease; background:rgba(255,255,255,.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,0,0,.06); box-shadow:0 16px 40px rgba(0,0,0,.1); list-style:none; }
            nav.nav-menu-open .nav-links { max-height:min(75vh, 440px); opacity:1; padding:6px 0 14px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
            .nav-links a { display:block; padding:15px 24px; font-size:16px; font-weight:500; border-bottom:1px solid var(--line); }
            .nav-links li:last-child a { border-bottom:none; }
            body.nav-menu-open-body { overflow:hidden; touch-action:none; }
            .content{padding:128px 20px 60px;}
            h1{font-size:28px;}
            h2{font-size:20px;}
        }
        @media (max-width:420px){
            .logo { height:40px; }
            .logo-icon { width:40px; height:40px; }
            .lang-switcher { height:40px; line-height:40px; padding:0 10px; font-size:13px; }
            .nav-menu-toggle { width:40px; height:40px; }
        }
    </style>
</head>

            const FALLBACK = "en";
            const storageKey = "fishfy_lang";
            const content = {
                de: { pageTitle:"Impressum", nav_features:"Funktionen", nav_about:"Über uns", nav_privacy:"Datenschutz", nav_imprint:"Impressum", home:"Startseite", privacy:"Datenschutz", imprint:"Impressum", terms:"Nutzungsbedingungen", nav_aria_menu:"Menü öffnen", nav_aria_close:"Menü schließen", nav_aria_backdrop:"Menü schließen", s1:"Angaben gemäß § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app\n\nVertreten durch: F. Grimminger", s2:"Haftungsausschluss", s2c:"Haftung für Inhalte:\nDie Inhalte unserer App wurden mit größter Sorgfalt erstellt. Für die Richtigkeit, Vollständigkeit und Aktualität der Inhalte können wir jedoch keine Gewähr übernehmen.\n\nHaftung für Links:\nSoweit in der App Verweise auf andere Angebote (z.B. E-Mail, Webseiten) gesetzt werden, haben wir keinen Einfluss auf deren Inhalte. Für verlinkte Inhalte sind die jeweiligen Anbieter verantwortlich.\n\nUrheberrecht:\nDie durch die Appbetreiber erstellten Inhalte und Werke auf dieser App unterliegen dem deutschen Urheberrecht.", footerCopy:"© 2026 Apzura. Alle Rechte vorbehalten." },
                en: { pageTitle:"Imprint", nav_features:"Functions", nav_about:"About", nav_privacy:"Privacy", nav_imprint:"Imprint", home:"Home", privacy:"Privacy", imprint:"Imprint", terms:"Terms", nav_aria_menu:"Open menu", nav_aria_close:"Close menu", nav_aria_backdrop:"Close menu", s1:"Information pursuant to § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nEmail: support@fishfy.app\n\nRepresented by: F. Grimminger", s2:"Disclaimer", s2c:"Liability for content:\nThe contents of our app were created with the greatest care. However, we cannot guarantee the correctness, completeness and topicality of the content.\n\nLiability for links:\nWhere the app contains references to other offerings (e.g. email, websites), we have no influence on their content. The respective providers are responsible for linked content.\n\nCopyright:\nThe content and works created by the app operator on this app are subject to German copyright law.", footerCopy:"© 2026 Apzura. All rights reserved." },
                nl: { pageTitle:"Colofon", nav_features:"Functies", nav_about:"Over ons", nav_privacy:"Privacy", nav_imprint:"Colofon", home:"Startpagina", privacy:"Privacy", imprint:"Colofon", terms:"Gebruiksvoorwaarden", nav_aria_menu:"Menu openen", nav_aria_close:"Menu sluiten", nav_aria_backdrop:"Menu sluiten", s1:"Informatie volgens § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-mail: support@fishfy.app\n\nVeregenwoordigd door: F. Grimminger", s2:"Aansprakelijkheidsbeperking", s2c:"Aansprakelijkheid voor inhoud:\nDe inhoud van onze app is met grote zorgvuldigheid samengesteld. Wij kunnen echter geen garantie geven voor de juistheid, volledigheid en actualiteit van de inhoud.\n\nAansprakelijkheid voor links:\nVoor zover in de app verwezen wordt naar andere aanbiedingen (bijv. e-mail, websites), hebben wij geen invloed op de inhoud daarvan. Voor gelinkte inhoud zijn de respectievelijke aanbieders verantwoordelijk.\n\nAuteursrecht:\nDe door de app-aanbieder gemaakte inhoud en werken in deze app vallen onder het Duitse auteursrecht.", footerCopy:"© 2026 Apzura. Alle rechten voorbehouden." },
                fr: { pageTitle:"Mentions légales", nav_features:"Fonctionnalités", nav_about:"À propos", nav_privacy:"Confidentialité", nav_imprint:"Mentions légales", home:"Accueil", privacy:"Confidentialité", imprint:"Mentions légales", terms:"Conditions", nav_aria_menu:"Ouvrir le menu", nav_aria_close:"Fermer le menu", nav_aria_backdrop:"Fermer le menu", s1:"Informations selon § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-mail : support@fishfy.app\n\nReprésenté par : F. Grimminger", s2:"Avertissement", s2c:"Responsabilité du contenu :\nLe contenu de notre app a été créé avec le plus grand soin. Nous ne pouvons toutefois pas garantir l'exactitude, l'exhaustivité et l'actualité du contenu.\n\nResponsabilité des liens :\nLorsque l'app contient des références à d'autres offres (p. ex. e-mail, sites web), nous n'avons aucune influence sur leur contenu. Les fournisseurs respectifs sont responsables du contenu lié.\n\nDroits d'auteur :\nLe contenu et les œuvres créés par l'éditeur de l'app dans cette app sont soumis au droit d'auteur allemand.", footerCopy:"© 2026 Apzura. Tous droits réservés." },
                lb: { pageTitle:"Impressum", nav_features:"Funktiounen", nav_about:"Iwwer eis", nav_privacy:"Dateschutz", nav_imprint:"Impressum", home:"Startsäit", privacy:"Dateschutz", imprint:"Impressum", terms:"Benotzungsbedingungen", nav_aria_menu:"Menu opmaachen", nav_aria_close:"Menu zoumaachen", nav_aria_backdrop:"Menu zoumaachen", s1:"Ugaben geméiss § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app\n\nVertrueden duerch: F. Grimminger", s2:"Haftungsausschluss", s2c:"Haftung fir Inhalter:\nD'Inhalter vun eiser App goufen mat gréisster Sorgfal erstallt. Fir d'Richtegkeet, Vollstännegkeet an Aktualitéit vun den Inhalter kënne mir awer keng Gewähr iwwerhuelen.\n\nHaftung fir Linken:\nSou wäit an der App Verweiser op aner Ubidder (z.B. E-Mail, Websäiten) gesat ginn, hu mir keen Afloss op déi hir Inhalter. Fir verlinkt Inhalter sinn déi jeweileg Ubidder verantwortlech.\n\nUrheberrecht:\nD'Duerch d'Appbetreiber erstallt Inhalter a Wierker op dëser App ënnerleeën dem däitschen Urheberrecht.", footerCopy:"© 2026 Apzura. All Rechter virbehalen." }
            };
            function normalizeLang(input){ if(!input) return FALLBACK; const v=input.toLowerCase(); if(v.startsWith("lb")||v.startsWith("lu")) return "lb"; const b=v.split("-")[0]; return SUPPORTED.includes(b)?b:FALLBACK; }
            window.__fishfyNavOpen = false;
            function applyNavMenuLabels(lang) {
                const t = content[lang] || content[FALLBACK];
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (toggle && t.nav_aria_menu && t.nav_aria_close) {
                    toggle.setAttribute("aria-label", window.__fishfyNavOpen ? t.nav_aria_close : t.nav_aria_menu);
                }
                if (backdrop && t.nav_aria_backdrop) {
                    backdrop.setAttribute("aria-label", t.nav_aria_backdrop);
                    backdrop.setAttribute("aria-hidden", window.__fishfyNavOpen ? "false" : "true");
                }
            }
            function isNarrowNav() { return window.matchMedia("(max-width: 768px)").matches; }
            function setNavMenuOpen(open) {
                const nav = document.getElementById("site-nav");
                const toggle = document.getElementById("nav-menu-toggle");
                if (!nav || !toggle) return;
                window.__fishfyNavOpen = !!open;
                nav.classList.toggle("nav-menu-open", window.__fishfyNavOpen);
                document.body.classList.toggle("nav-menu-open-body", window.__fishfyNavOpen);
                toggle.setAttribute("aria-expanded", window.__fishfyNavOpen ? "true" : "false");
                applyNavMenuLabels(normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK));
            }
            function closeNavMenu() { if (window.__fishfyNavOpen) setNavMenuOpen(false); }
            function toggleNavMenu() { if (!isNarrowNav()) return; setNavMenuOpen(!window.__fishfyNavOpen); }
            function render(lang){
                const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.imprint;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("s1").textContent = t.s1;
                document.getElementById("s1c").textContent = t.s1c;
                document.getElementById("s2").textContent = t.s2;
                document.getElementById("s2c").textContent = t.s2c;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;
                applyNavMenuLabels(lang);
            }
            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => { const lang = normalizeLang(event.target.value); localStorage.setItem(storageKey, lang); render(lang); });
            (function initMobileNav() {
                const toggle = document.getElementById("nav-menu-toggle");
                const backdrop = document.getElementById("nav-backdrop");
                if (!toggle) return;
                toggle.addEventListener("click", function (e) { e.stopPropagation(); toggleNavMenu(); });
                if (backdrop) backdrop.addEventListener("click", closeNavMenu);
                const panel = document.getElementById("primary-nav");
                if (panel) {
                    panel.querySelectorAll("a").forEach(function (link) {
                        link.addEventListener("click", function () { if (isNarrowNav()) closeNavMenu(); });
                    });
                }
                window.addEventListener("resize", function () { if (!isNarrowNav()) closeNavMenu(); }, { passive: true });
                document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeNavMenu(); });
            })();
        })();
    </script>
</body>
