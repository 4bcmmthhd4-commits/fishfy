<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprint - Fishfy</title>
    <meta name="description" content="Imprint for the Fishfy app">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3;
            --ink: #1d1d1f;
            --ink-soft: #424245;
            --surface: #f5f5f7;
            --card: #ffffff;
            --line: #e5e5ea;
            --white: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height:1.7;
            color:var(--ink);
            background:var(--surface);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        nav {
            position:fixed;
            top:0;
            left:0;
            right:0;
            background:rgba(245,245,247,.72);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            z-index:1000;
            padding:14px 24px;
            border-bottom:1px solid rgba(0,0,0,.05);
        }
        .nav-container { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:16px; }
        .logo { text-decoration:none; display:flex; align-items:center; gap:0; }
        .logo-icon { width:74px; height:74px; } .logo-icon img { width:100%; height:100%; object-fit:contain; }
        .nav-links { display:flex; gap:32px; list-style:none; }
        .nav-links a { color:var(--ink-soft); text-decoration:none; font-weight:500; font-size:15px; transition:color .2s; }
        .nav-links a:hover { color:var(--primary); }
        .lang-switcher { border:1px solid var(--line); background:rgba(255,255,255,.9); color:var(--ink); border-radius:999px; padding:8px 14px; font-size:14px; font-weight:500; }
        .content { max-width:800px; margin:0 auto; padding:138px 24px 80px; }
        h1 { font-size:36px; font-weight:700; color:var(--ink); margin-bottom:48px; letter-spacing:-0.02em; }
        h2 { font-size:22px; font-weight:600; color:var(--ink); margin-top:48px; margin-bottom:16px; }
        .info-box { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:24px; margin:24px 0; color:var(--ink-soft); white-space:pre-line; }
        .section-text { color:var(--ink-soft); white-space:pre-line; margin-bottom:16px; }
        footer { background:#1d1d1f; color:rgba(255,255,255,.72); padding:40px 24px; text-align:center; }
        footer a { color:rgba(255,255,255,.7); text-decoration:none; margin:0 16px; } footer a:hover { color:white; }
        .footer-links { margin-bottom:24px; } .footer-copy { font-size:13px; opacity:.7; }
        @media (max-width:768px){
            .nav-container { flex-wrap:wrap; row-gap:10px; }
            .nav-links { display:flex; order:3; width:100%; justify-content:center; flex-wrap:wrap; gap:12px 18px; }
            .nav-links a { font-size:14px; }
            .content{padding:128px 20px 60px;}
            h1{font-size:28px;}
            h2{font-size:20px;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo"><div class="logo-icon"><img src="logo.svg" alt="Fishfy Logo"></div></a>
            <ul class="nav-links">
                <li><a href="index.html#features" data-i18n="nav_features">Features</a></li>
                <li><a href="index.html#about" data-i18n="nav_about">Über uns</a></li>
                <li><a href="datenschutz.html" data-i18n="nav_privacy">Datenschutz</a></li>
                <li><a href="impressum.html" data-i18n="nav_imprint">Impressum</a></li>
            </ul>
            <select id="lang-switcher" class="lang-switcher" aria-label="Select language">
                <option value="de">DE</option><option value="en">EN</option><option value="nl">NL</option><option value="fr">FR</option><option value="lb">LB</option>
            </select>
        </div>
    </nav>
    <main class="content">
        <h1 id="title">Imprint</h1>
        <h2 id="s1"></h2>
        <div class="info-box" id="s1c"></div>
        <h2 id="s2"></h2>
        <div class="section-text" id="s2c"></div>
    </main>
    <footer>
        <div class="footer-links">
            <a href="index.html" data-i18n="home">Home</a>
            <a href="datenschutz.html" data-i18n="privacy">Privacy</a>
            <a href="impressum.html" data-i18n="imprint">Imprint</a>
            <a href="nutzungsbedingungen.html" data-i18n="terms">Terms</a>
        </div>
        <p class="footer-copy">© 2026 Apzura. All rights reserved.</p>
    </footer>
    <script>
        (function () {
            const SUPPORTED = ["de", "en", "nl", "fr", "lb"];
            const FALLBACK = "en";
            const storageKey = "fishfy_lang";
            const content = {
                de: { pageTitle:"Impressum", nav_features:"Features", nav_about:"Über uns", nav_privacy:"Datenschutz", nav_imprint:"Impressum", home:"Startseite", privacy:"Datenschutz", imprint:"Impressum", terms:"Nutzungsbedingungen", s1:"Angaben gemäß § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app\n\nVertreten durch: F. Grimminger", s2:"Haftungsausschluss", s2c:"Haftung für Inhalte:\nDie Inhalte unserer App wurden mit größter Sorgfalt erstellt. Für die Richtigkeit, Vollständigkeit und Aktualität der Inhalte können wir jedoch keine Gewähr übernehmen.\n\nHaftung für Links:\nSoweit in der App Verweise auf andere Angebote (z.B. E-Mail, Webseiten) gesetzt werden, haben wir keinen Einfluss auf deren Inhalte. Für verlinkte Inhalte sind die jeweiligen Anbieter verantwortlich.\n\nUrheberrecht:\nDie durch die Appbetreiber erstellten Inhalte und Werke auf dieser App unterliegen dem deutschen Urheberrecht.", footerCopy:"© 2026 Apzura. Alle Rechte vorbehalten." },
                en: { pageTitle:"Imprint", nav_features:"Features", nav_about:"About", nav_privacy:"Privacy", nav_imprint:"Imprint", home:"Home", privacy:"Privacy", imprint:"Imprint", terms:"Terms", s1:"Information pursuant to § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nEmail: support@fishfy.app\n\nRepresented by: F. Grimminger", s2:"Disclaimer", s2c:"Liability for content:\nThe contents of our app were created with the greatest care. However, we cannot guarantee the correctness, completeness and topicality of the content.\n\nLiability for links:\nWhere the app contains references to other offerings (e.g. email, websites), we have no influence on their content. The respective providers are responsible for linked content.\n\nCopyright:\nThe content and works created by the app operator on this app are subject to German copyright law.", footerCopy:"© 2026 Apzura. All rights reserved." },
                nl: { pageTitle:"Colofon", nav_features:"Functies", nav_about:"Over ons", nav_privacy:"Privacy", nav_imprint:"Colofon", home:"Startpagina", privacy:"Privacy", imprint:"Colofon", terms:"Gebruiksvoorwaarden", s1:"Informatie volgens § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-mail: support@fishfy.app\n\nVeregenwoordigd door: F. Grimminger", s2:"Aansprakelijkheidsbeperking", s2c:"Aansprakelijkheid voor inhoud:\nDe inhoud van onze app is met grote zorgvuldigheid samengesteld. Wij kunnen echter geen garantie geven voor de juistheid, volledigheid en actualiteit van de inhoud.\n\nAansprakelijkheid voor links:\nVoor zover in de app verwezen wordt naar andere aanbiedingen (bijv. e-mail, websites), hebben wij geen invloed op de inhoud daarvan. Voor gelinkte inhoud zijn de respectievelijke aanbieders verantwoordelijk.\n\nAuteursrecht:\nDe door de app-aanbieder gemaakte inhoud en werken in deze app vallen onder het Duitse auteursrecht.", footerCopy:"© 2026 Apzura. Alle rechten voorbehouden." },
                fr: { pageTitle:"Mentions légales", nav_features:"Fonctionnalités", nav_about:"À propos", nav_privacy:"Confidentialité", nav_imprint:"Mentions légales", home:"Accueil", privacy:"Confidentialité", imprint:"Mentions légales", terms:"Conditions", s1:"Informations selon § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-mail : support@fishfy.app\n\nReprésenté par : F. Grimminger", s2:"Avertissement", s2c:"Responsabilité du contenu :\nLe contenu de notre app a été créé avec le plus grand soin. Nous ne pouvons toutefois pas garantir l'exactitude, l'exhaustivité et l'actualité du contenu.\n\nResponsabilité des liens :\nLorsque l'app contient des références à d'autres offres (p. ex. e-mail, sites web), nous n'avons aucune influence sur leur contenu. Les fournisseurs respectifs sont responsables du contenu lié.\n\nDroits d'auteur :\nLe contenu et les œuvres créés par l'éditeur de l'app dans cette app sont soumis au droit d'auteur allemand.", footerCopy:"© 2026 Apzura. Tous droits réservés." },
                lb: { pageTitle:"Impressum", nav_features:"Funktiounen", nav_about:"Iwwer eis", nav_privacy:"Dateschutz", nav_imprint:"Impressum", home:"Startsäit", privacy:"Dateschutz", imprint:"Impressum", terms:"Benotzungsbedingungen", s1:"Ugaben geméiss § 5 TMG", s1c:"Apzura\nHafenstraße 39, 67346 Speyer\nE-Mail: support@fishfy.app\n\nVertrueden duerch: F. Grimminger", s2:"Haftungsausschluss", s2c:"Haftung fir Inhalter:\nD'Inhalter vun eiser App goufen mat gréisster Sorgfal erstallt. Fir d'Richtegkeet, Vollstännegkeet an Aktualitéit vun den Inhalter kënne mir awer keng Gewähr iwwerhuelen.\n\nHaftung fir Linken:\nSou wäit an der App Verweiser op aner Ubidder (z.B. E-Mail, Websäiten) gesat ginn, hu mir keen Afloss op déi hir Inhalter. Fir verlinkt Inhalter sinn déi jeweileg Ubidder verantwortlech.\n\nUrheberrecht:\nD'Duerch d'Appbetreiber erstallt Inhalter a Wierker op dëser App ënnerleeën dem däitschen Urheberrecht.", footerCopy:"© 2026 Apzura. All Rechter virbehalen." }
            };
            function normalizeLang(input){ if(!input) return FALLBACK; const v=input.toLowerCase(); if(v.startsWith("lb")||v.startsWith("lu")) return "lb"; const b=v.split("-")[0]; return SUPPORTED.includes(b)?b:FALLBACK; }
            function render(lang){
                const t = content[lang] || content[FALLBACK];
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.pageTitle;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("s1").textContent = t.s1;
                document.getElementById("s1c").textContent = t.s1c;
                document.getElementById("s2").textContent = t.s2;
                document.getElementById("s2c").textContent = t.s2c;
                document.querySelector('[data-i18n="nav_features"]').textContent = t.nav_features;
                document.querySelector('[data-i18n="nav_about"]').textContent = t.nav_about;
                document.querySelector('[data-i18n="nav_privacy"]').textContent = t.nav_privacy;
                document.querySelector('[data-i18n="nav_imprint"]').textContent = t.nav_imprint;
                document.querySelector('[data-i18n="home"]').textContent = t.home;
                document.querySelector('[data-i18n="privacy"]').textContent = t.privacy;
                document.querySelector('[data-i18n="imprint"]').textContent = t.imprint;
                document.querySelector('[data-i18n="terms"]').textContent = t.terms;
                document.querySelector(".footer-copy").textContent = t.footerCopy;
            }
            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => { const lang = normalizeLang(event.target.value); localStorage.setItem(storageKey, lang); render(lang); });
        })();
    </script>
</body>
</html>
