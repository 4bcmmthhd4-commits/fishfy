        .nav-links { display:flex; gap:32px; list-style:none; }
        .nav-links a { color:var(--ink-soft); text-decoration:none; font-weight:500; font-size:15px; transition:color .2s; }
        .nav-links a.active { color: var(--primary); }
        .nav-links a:hover { color:var(--primary); }
        .nav-links a:focus-visible,
        .lang-switcher:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 10px;
        }
        .lang-switcher {
            border: 1px solid var(--line);
            background: rgba(255,255,255,.9);
            color: var(--ink);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;
        }
        .content { max-width: 800px; margin: 0 auto; padding: 138px 24px 80px; }
        h1 { font-size: 36px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing:-0.02em; }
        .last-updated { color: var(--ink-soft); font-size: 14px; margin-bottom: 48px; }
        h2 { font-size: 22px; font-weight: 600; color: var(--ink); margin-top: 48px; margin-bottom: 16px; }
        p { color: var(--ink-soft); margin-bottom: 16px; }
        .info-box { background: var(--card); border:1px solid var(--line); border-radius: 16px; padding: 24px; margin: 24px 0; color: var(--ink-soft); white-space: pre-line; }

        .footer-links { margin-bottom: 24px; }
        .footer-copy { font-size: 13px; opacity: 0.7; }
        @media (max-width: 768px) {

                    s2: "2. Collecte et stockage des données",
                    s2c: "Fishfy collecte et stocke les données suivantes :\n\n• Données de localisation (selon votre autorisation dans les réglages iOS)\n• Photos de prises (stockées localement sur l'appareil)\n• Spots de pêche et notes (stockés localement sur l'appareil)\n• Données météo (via Apple WeatherKit et Open-Meteo)\n• Données de prises avec conditions météo (stockées localement sur l'appareil)\n\nToutes les données sont stockées exclusivement sur votre appareil. Aucune donnée n'est transmise à des serveurs externes, sauf :\n• Apple WeatherKit et Open-Meteo pour les données météo\n• Notifications push (Pro) : pour envoyer des notifications (activité, prises similaires), votre jeton d'appareil et vos réglages (p. ex. spots sélectionnés) sont envoyés à Firebase (Google). Le traitement est effectué côté serveur à partir des données météo ; vos prises et spots ne sont pas transmis à des tiers.\n• Synchronisation cloud (Pro, optionnel) : lorsque vous êtes connecté, les prises et spots peuvent être synchronisés entre appareils ; ils sont traités et stockés sur les serveurs Firebase (Google).\n• Import d'anciennes prises (Pro, optionnel) : en utilisant 'Anciennes prises', des photos sélectionnées de votre photothèque, l'heure/la position saisies manuellement et des données météo historiques enrichies automatiquement sont enregistrées dans la prise.\n• Transfert de prise : les prises importées historiquement sont exclues du transfert.\n• Optionnel : partage volontaire de données anonymisées pour améliorer l'app (voir section 7)",
                    s3: "3. Données de localisation",
                    s3c: "L'app utilise les données de localisation pour :\n• Récupérer les données météo pour votre position actuelle\n• Marquer les spots de pêche\n• Enregistrer les lieux de prise\n\nVous décidez quand l'app peut accéder à votre position. Dans les réglages iOS vous pouvez choisir : « Jamais », « Demander la prochaine fois ou quand je partage », « Lors de l'utilisation de l'app » ou « Toujours ». L'app n'utilise la localisation que pour ces finalités et ne la stocke pas de façon permanente. Vous pouvez modifier ou révoquer l'accès à tout moment dans les réglages iOS.",
                    s4: "4. Appareil photo et photothèque",
                    s4c: "L'app a besoin de l'accès à la caméra pour photographier les prises. Les photos sont stockées uniquement sur votre appareil et ne sont pas transmises à des tiers.\n\nOptionnellement, l'app peut demander l'accès à la photothèque pour enregistrer les photos de prises dans votre galerie. Les photos restent sur votre appareil.",
                    s5: "5. Données météo",
                    s5c: "L'app utilise Apple WeatherKit et Open-Meteo pour récupérer les données météo. Les données Apple WeatherKit sont soumises à la politique de confidentialité d'Apple. Open-Meteo est un service météo ouvert (open-meteo.com).\n\nPour l'estimation automatique du niveau d'eau, les coordonnées du spot (latitude/longitude) et, si disponible, le code pays sont transmises au service backend Fishfy. Ce service interroge, selon le pays, les sources de niveau disponibles et renvoie à l'app les stations correspondantes avec les valeurs actuelles en cm. Les sources actuellement intégrées incluent notamment PEGELONLINE (Allemagne), Rijkswaterstaat WaterWebservices (Pays-Bas), eHYD (Autriche), données hydrologiques OFEV/BAFU (Suisse), HUBEAU (France), WATERINFO/HIC (Belgique, Flandre), Hydrométrie Wallonie KiWIS (Belgique, Wallonie), BRUWATER Open Data (Belgique, Bruxelles) et Héichwaasser (Luxembourg).\n\nLes requêtes météo et de niveau d'eau servent uniquement à fournir les fonctionnalités de l'app et ne sont pas utilisées pour le profilage.",
                    s6: "6. Export des données",
                    s6c: "Vous pouvez exporter vos prises en PDF à tout moment. L'export est effectué localement sur votre appareil.",
                    s7: "7. Partage volontaire de données",
                    s7c: "Vous pouvez optionnellement accepter que vos données de prises anonymisées nous soient automatiquement envoyées pour améliorer l'app. Cette fonction est proposée activée par défaut au premier lancement mais peut être désactivée à tout moment dans les réglages.\n\nLes données ne sont envoyées qu'avec votre consentement explicite (en activant l'interrupteur) et servent à l'analyse et à l'amélioration de l'app. Les photos de prises sur lesquelles aucune personne ni visage n'est reconnaissable (poisson et arrière-plan uniquement) peuvent en outre être utilisées pour nos réseaux sociaux et la promotion de l'app. Les photos montrant des personnes identifiables ne sont pas utilisées. De même, aucune donnée de localisation exacte ou autrement identifiable issue des images n'est utilisée à des fins publicitaires ; si un lieu est reconnaissable (p. ex. lieux marquants, panneaux, plaques d'immatriculation, numéros de maison), il est anonymisé ou pixellisé avant utilisation. Vous pouvez révoquer ce consentement à tout moment en désactivant la fonction dans les réglages.\n\nLes données envoyées ne contiennent aucune information personnelle et sont traitées de manière anonyme.",
                    s8: "8. Vos droits (RGPD)",
                    s8c: "Vous avez le droit :\n• D'obtenir des informations sur vos données stockées (art. 15 RGPD)\n• À la rectification des données inexactes (art. 16 RGPD)\n• À l'effacement de vos données (art. 17 RGPD) - via la fonction de l'app « Supprimer toutes les données »\n• À la limitation du traitement (art. 18 RGPD)\n• De vous opposer au traitement (art. 21 RGPD)\n• À la portabilité des données (art. 20 RGPD)\n• De retirer votre consentement au partage de données (à tout moment dans les réglages)\n• De déposer une plainte auprès d'une autorité de contrôle (art. 77 RGPD)\n\nLorsque vous désinstallez l'app, toutes les données stockées localement sont supprimées.",
                    s9: "9. Contact",
                    s9c: "Pour toute question relative à la confidentialité, contactez-nous à :\n\nsupport@fishfy.app",
                    footerCopy: "© 2026 Apzura. Tous droits réservés."
                },

                    s2: "2. Donnéeënerhiewung an -späicherung",
                    s2c: "Fishfy erheeft a späichert folgend Donnéeën:\n\n• Standuertdaten (je no Ärer Fräigab an den iOS-Astellungen)\n• Fotoen vu Fäng (lokal um Apparat)\n• Angelspots a Notizen (lokal um Apparat)\n• Wiederdaten (iwwer Apple WeatherKit an Open-Meteo)\n• Fangdaten mat Wiederbedingungen (lokal um Apparat)\n\nAll Donnéeë ginn exklusiv lokal um Ärem Apparat gespäichert. Et kënnt keng Iwwerdroung un extern Server, ausser:\n• Apple WeatherKit an Open-Meteo fir Wiederdaten\n• Push-Notifikatiounen (Pro): Fir d'Liwwerung vun Notifikatiounen (Aktivitéit, Ähnlech Fäng) ginn Är Apparat-Token an Är Astellungen (z.B. ausgewielte Spots) un Firebase (Google) iwwermëttelt. D'Berechnung geschitt serverseitig op Basis vu Wiederdaten; Är Fäng a Spots ginn dobäi net un Drëtt weiderginn.\n• Cloud-Synchronisatioun (Pro, optional): Bei Umellung mat engem Kont kënne Fäng a Spots tëschent Apparater synchroniséiert ginn; dobäi ginn se op Servere vu Firebase (Google) veraarbecht a gespäichert.\n• Import vun ale Fäng (Pro, optional): Bei der Funktioun 'Al Fäng' ginn ausgewielte Fotoen aus der Mediathek, manuell aginn Fangzäit/-positioun an automatesch ergänzt historesch Wiederdaten am Fangdatensatz gespäichert.\n• Fang-Transfer: Historesch importéiert Fäng si vum Transfer ausgeschloss.\n• Optional: Fräiwëlleg anonymiséiert Donnéeëweidergab fir App-Verbesserung (kuck Abschnitt 7)",
                    s3: "3. Standuertdaten",

                    s5: "5. Wiederdaten",
                    s5c: "D'App benotzt Apple WeatherKit an Open-Meteo, fir Wiederdaten ofzeruffen. D'Donnéeë vun Apple WeatherKit ënnerleeën den Dateschutzbestëmmungen vun Apple. Open-Meteo ass en oppene Wiederdéngscht (open-meteo.com).\n\nFir déi automatesch Pegel-Schätzung ginn d'Spot-Koordinaten (Breet/Längt) an, wa verfügbar, de Lännercode un de Fishfy-Backendservice iwwermëttelt. Dëse Service freet je no Land verfügbar Pegelquellen of a liwwert passend Pegelstatiounen mat aktuelle Wäerter a cm un d'App zeréck. Aktuell ugeschloss Quelle sinn u.a. PEGELONLINE (Däitschland), Rijkswaterstaat WaterWebservices (Holland), eHYD (Éisträich), BAFU-Hydrodonnéeën (Schwäiz), HUBEAU (Frankräich), WATERINFO/HIC (Belsch, Flandern), Hydrométrie Wallonie KiWIS (Belsch, Wallounien), BRUWATER Open Data (Belsch, Bréissel) an Héichwaasser (Lëtzebuerg).\n\nWieder- a Pegel-Ufroe gi just fir d'Funktioune vun der App benotzt a net fir Profilbildung.",

                    s7: "7. Fräiwëlleg Donnéeëweidergab",
                    s7c: "Dir kënnt optional zoustimmen, datt Är anonymiséiert Fangdaten automatesch un eis iwwermëttelt ginn, fir d'App ze verbesseren. Dës Funktioun gëtt beim éischte Start vun der App standardméisseg aktivéiert ugebueden, kann awer jee Zäit an den Astellungen desaktivéiert ginn.\n\nD'Donnéeë ginn nëmme mat Ärer ausdrécklecher Zoustëmmung (duerch Aktivéierung vum Toggle) versent a déngen der Analyse an Verbesserung vun der App. Fangfotoen, op deene keng Persounen oder Gesiichter ze gesinn sinn (nëmme Fësch an Hannergrond), kënnen och fir eis Social-Media-Kanäl an zur Bewerbung vun der App benotzt ginn. Fotoen mat erkennbare Persounen ginn net benotzt. Genee esou ginn keng exakt oder soss erkennbar Standuertdaten aus Biller fir Werbezwecker benotzt; wann e Standuert erkennbar ass (z. B. markant Plazen, Schëlter, Nummereschëlder, Hausnummeren), gëtt en virum Asaz onkenntlech gemaach bzw. verpixelt. Dir kënnt dës Zoustëmmung jee Zäit widerrufen, andeems du d'Fonktioun an den Astellungen desaktivéiers.\n\nD'iwwermëttelt Donnéeë enthalen keng perséinlech Informatiounen a ginn anonymiséiert veraarbecht.",

            function normalizeLang(input) {
                if (!input) return FALLBACK;
                const value = input.toLowerCase();
                if (value.startsWith("lb") || value.startsWith("lu")) return "lb";
                const base = value.split("-")[0];
                return SUPPORTED.includes(base) ? base : FALLBACK;
            }

            function escapeHtml(text) {
                return text
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;");
            }

            function render(lang) {
                const t = content[lang] || content[FALLBACK];
                const setTextAll = (key, value) => {
                    document.querySelectorAll('[data-i18n="' + key + '"]').forEach((el) => {
                        el.textContent = value;
                    });
                };
                document.documentElement.lang = lang;
                document.title = "Fishfy - " + t.privacy;
                document.getElementById("title").textContent = t.pageTitle;
                document.getElementById("updated").textContent = t.updated;
                setTextAll("nav_features", t.nav_features);
                setTextAll("nav_about", t.nav_about);
                setTextAll("nav_privacy", t.nav_privacy);
                setTextAll("nav_imprint", t.nav_imprint);
                setTextAll("home", t.home);
                setTextAll("privacy", t.privacy);
                setTextAll("imprint", t.imprint);
                setTextAll("terms", t.terms);
                document.querySelector(".footer-copy").textContent = t.footerCopy;

                sections.innerHTML = [
                    ["s1", "s1c", true],
                    ["s2", "s2c", false],
                    ["s3", "s3c", false],
                    ["s4", "s4c", false],
                    ["s5", "s5c", false],
                    ["s6", "s6c", false],
                    ["s7", "s7c", false],
                    ["s8", "s8c", false],
                    ["s9", "s9c", true]
                ].map(([titleKey, contentKey, boxed]) => {
                    const block = '<h2>' + escapeHtml(t[titleKey]) + '</h2>';
                    const text = escapeHtml(t[contentKey]).replaceAll("\n", "<br>");
                    return block + (boxed ? '<div class="info-box">' + text + '</div>' : '<div class="section-text">' + text + '</div>');
                }).join("");
            }

            const preferred = normalizeLang(localStorage.getItem(storageKey) || navigator.language || FALLBACK);
            render(preferred);
            const switcher = document.getElementById("lang-switcher");
            switcher.value = preferred;
            switcher.addEventListener("change", (event) => {
                const lang = normalizeLang(event.target.value);
                localStorage.setItem(storageKey, lang);
                render(lang);
            });
        })();
    </script>
